<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2班 · 智慧班级平台</title>
    <meta name="description" content="2班智慧班级平台">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ps-blue: #003791;
            --ps-light-blue: #0070CC;
            --ps-cyan: #00B4D8;
            --ps-white: #FFFFFF;
            --ps-dark: #0A0A0A;
            --ps-gray: #1A1A1A;
            --ps-card: rgba(255, 255, 255, 0.03);
            --ps-card-hover: rgba(255, 255, 255, 0.06);
            --ps-border: rgba(255, 255, 255, 0.08);
            --ps-text: #FFFFFF;
            --ps-text-secondary: rgba(255, 255, 255, 0.55);
            --ps-accent: #0070CC;
            --ps-gradient: linear-gradient(135deg, #003791 0%, #0070CC 50%, #00B4D8 100%);
            --ps-glow: 0 0 40px rgba(0, 112, 204, 0.25);
            --apple-radius: 20px;
            --apple-radius-sm: 14px;
            --apple-transition: cubic-bezier(0.22, 0.61, 0.36, 1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --admin-gold: #d4a843;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--ps-dark);
            color: var(--ps-text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景动画 */
        .ps-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .ps-bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 15% 40%, rgba(0, 55, 145, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 25%, rgba(0, 112, 204, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 75%, rgba(0, 180, 216, 0.25) 0%, transparent 55%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            25% { opacity: .75; }
            50% { opacity: .9; }
            75% { opacity: .8; }
        }
        .ps-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .particle {
            position: absolute;
            background: var(--ps-cyan);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: .7; }
            90% { opacity: .15; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ========== PS5 风格顶端导航栏 ========== */
        .ps5-top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, .75);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-bottom: 1px solid var(--ps-border);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            transition: all .4s var(--apple-transition);
        }
        .ps5-nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            transition: all 0.3s var(--apple-transition);
            position: relative;
            padding: 0.4rem;
            border-radius: 14px;
            min-width: 64px;
        }
        .ps5-nav-icon .icon-square {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--ps-text-secondary);
            transition: all 0.35s var(--apple-transition);
            border: 1.5px solid transparent;
        }
        .ps5-nav-icon .icon-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--ps-text-secondary);
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.35s var(--apple-transition);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .ps5-nav-icon:hover .icon-square {
            background: rgba(255, 255, 255, 0.1);
            color: var(--ps-text);
            transform: translateY(-2px);
        }
        .ps5-nav-icon:hover .icon-label {
            opacity: 0.7;
            transform: translateY(0);
        }
        .ps5-nav-icon.active .icon-square {
            background: var(--ps-gradient);
            color: #fff;
            border-color: transparent;
            transform: scale(1.15);
            box-shadow: var(--ps-glow);
            width: 56px;
            height: 56px;
            border-radius: 16px;
            font-size: 1.5rem;
        }
        .ps5-nav-icon.active .icon-label {
            opacity: 1;
            transform: translateY(0);
            color: var(--ps-text);
            font-weight: 700;
        }

        /* 用户菜单和搜索 */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-left: auto;
        }
        .search-box {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--ps-border);
            border-radius: 25px;
            padding: .4rem .8rem;
            display: flex;
            align-items: center;
            gap: .4rem;
            color: var(--ps-text-secondary);
            transition: all .3s;
        }
        .search-box:focus-within {
            background: rgba(255, 255, 255, .1);
            border-color: var(--ps-light-blue);
            box-shadow: 0 0 20px rgba(0, 112, 204, .2);
        }
        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            color: var(--ps-text);
            font-size: .82rem;
            width: 100px;
            font-family: inherit;
        }
        .btn {
            border: none;
            padding: .5rem 1.2rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
            font-size: .8rem;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--ps-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 55, 145, .4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 55, 145, .55);
        }
        .btn-outline {
            background: transparent;
            color: var(--ps-text);
            border: 1.5px solid var(--ps-border);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, .04);
        }
        .btn-sm {
            padding: .3rem .8rem;
            font-size: .72rem;
        }
        .btn-admin {
            background: linear-gradient(135deg, #8b6914 0%, #d4a843 50%, #f0d078 100%);
            color: #1a1a1a;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: .4rem;
            background: rgba(255, 255, 255, .06);
            padding: .3rem 1rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: .8rem;
            border: 1px solid var(--ps-border);
        }
        .role-tag {
            font-size: .65rem;
            background: var(--ps-gradient);
            color: #fff;
            padding: .1rem .5rem;
            border-radius: 10px;
        }
        .role-tag.admin {
            background: linear-gradient(135deg, #8b6914, #d4a843);
            color: #1a1a1a;
            font-weight: 700;
        }
        .btn-logout {
            background: transparent;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-weight: 600;
            font-size: .75rem;
            padding: .2rem .5rem;
            border-radius: 8px;
        }
        .btn-logout:hover {
            background: rgba(255, 71, 87, .1);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 全屏登录界面 */
        .fullscreen-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            background: var(--ps-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-login.hidden {
            display: none;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid var(--ps-border);
            border-radius: 24px;
            padding: 3rem;
            width: 440px;
            max-width: 92vw;
            text-align: center;
            animation: slideUp 0.5s var(--apple-transition);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .login-container .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: var(--ps-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0 auto 1.5rem;
            box-shadow: var(--ps-glow);
        }
        .login-container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .login-container p {
            color: var(--ps-text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .login-container select,
        .login-container input {
            width: 100%;
            margin: 0.5rem 0;
        }
        .login-container .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }
        .login-container .toggle-link {
            color: var(--ps-light-blue);
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            display: block;
        }

        /* 侧边栏（消息页面） */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: rgba(10, 10, 10, .55);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--ps-border);
            display: flex;
            flex-direction: column;
            transition: all .4s;
            overflow-y: auto;
        }
        .sidebar.hidden {
            display: none;
        }
        .sidebar-header {
            padding: 1.2rem 1rem .8rem;
            font-weight: 700;
            font-size: 1rem;
            border-bottom: 1px solid var(--ps-border);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, .75);
            backdrop-filter: blur(20px);
            z-index: 5;
        }
        .sidebar-list {
            list-style: none;
            padding: .5rem;
        }
        .sidebar-item {
            padding: .7rem .9rem;
            margin: .1rem 0;
            border-radius: var(--apple-radius-sm);
            display: flex;
            align-items: center;
            gap: .6rem;
            cursor: pointer;
            transition: all .3s;
            font-weight: 500;
            font-size: .85rem;
            border: 1px solid transparent;
        }
        .sidebar-item:hover {
            background: var(--ps-card-hover);
            border-color: var(--ps-border);
            transform: translateX(4px);
        }
        .sidebar-item.active {
            background: rgba(0, 112, 204, .12);
            border-color: rgba(0, 112, 204, .25);
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: transparent;
        }
        .content-area::-webkit-scrollbar {
            width: 5px;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 3px;
        }

        .card {
            background: var(--ps-card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--ps-border);
            border-radius: var(--apple-radius);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            transition: all .4s;
            animation: cardAppear .5s var(--apple-transition) both;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card:hover {
            background: rgba(255, 255, 255, .04);
            border-color: rgba(255, 255, 255, .15);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            transform: translateY(-2px);
        }
        .card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: .6rem;
            background: var(--ps-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: .6rem;
        }
        select,
        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="time"],
        input[type="number"],
        input[type="file"],
        textarea {
            padding: .6rem .8rem;
            border-radius: 10px;
            border: 1.5px solid var(--ps-border);
            font-family: inherit;
            font-size: .85rem;
            background: rgba(255, 255, 255, .04);
            color: var(--ps-text);
            transition: all .3s;
            width: 100%;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        select:focus,
        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--ps-light-blue);
            box-shadow: 0 0 20px rgba(0, 112, 204, .15);
            background: rgba(255, 255, 255, .07);
        }
        select option {
            background: var(--ps-dark);
            color: var(--ps-text);
        }

        .grid {
            display: grid;
            gap: 1rem;
        }
        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }

        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 12px;
            font-size: .7rem;
            font-weight: 600;
        }
        .badge-success {
            background: rgba(16, 185, 129, .2);
            color: var(--success);
        }
        .badge-warning {
            background: rgba(245, 158, 11, .2);
            color: var(--warning);
        }
        .badge-info {
            background: rgba(59, 130, 246, .2);
            color: var(--info);
        }
        .badge-danger {
            background: rgba(239, 68, 68, .2);
            color: var(--danger);
        }
        .badge-admin {
            background: rgba(212, 168, 67, .2);
            color: var(--admin-gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }
        th,
        td {
            padding: .7rem .9rem;
            text-align: left;
            border-bottom: 1px solid var(--ps-border);
        }
        th {
            font-weight: 700;
            color: var(--ps-text-secondary);
            font-size: .78rem;
            text-transform: uppercase;
        }
        tr:hover {
            background: rgba(255, 255, 255, .02);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .2rem .7rem;
            border-radius: 15px;
            font-size: .72rem;
            font-weight: 600;
            margin: .15rem;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--ps-border);
        }

        .info-banner {
            background: rgba(0, 112, 204, .08);
            border-left: 3px solid var(--ps-light-blue);
            padding: .9rem 1.1rem;
            border-radius: 0 10px 10px 0;
            margin-top: .9rem;
            font-size: .82rem;
            color: var(--ps-text-secondary);
        }

        .toast {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--ps-gray);
            color: var(--ps-text);
            padding: .8rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: .82rem;
            z-index: 300;
            border: 1px solid var(--ps-border);
            animation: toastIn .35s, toastOut .35s 2.5s forwards;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
        }
        .toast.success {
            border-color: rgba(16, 185, 129, .5);
        }
        .toast.error {
            border-color: rgba(239, 68, 68, .5);
        }
        @keyframes toastIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn .25s;
        }
        .modal-overlay.hidden {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: var(--ps-gray);
            border: 1px solid var(--ps-border);
            border-radius: var(--apple-radius);
            padding: 2rem;
            width: 500px;
            max-width: 92vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .5);
            animation: modalSlideUp .35s;
        }
        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 {
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .modal-content label {
            font-weight: 600;
            font-size: .8rem;
            color: var(--ps-text-secondary);
            display: block;
            margin-top: .7rem;
            margin-bottom: .2rem;
        }
        .modal-actions {
            display: flex;
            gap: .7rem;
            margin-top: 1.2rem;
        }
        .modal-actions .btn {
            flex: 1;
        }

        /* AI 聊天 */
        .ai-full-chat {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            background: var(--ps-card);
            border: 1px solid var(--ps-border);
            border-radius: var(--apple-radius);
            overflow: hidden;
        }
        .ai-chat-header {
            padding: 1rem 1.3rem;
            border-bottom: 1px solid var(--ps-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .6rem;
            background: rgba(10, 10, 10, .5);
        }
        .ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.3rem;
            display: flex;
            flex-direction: column;
            gap: .8rem;
        }
        .msg {
            padding: .8rem 1rem;
            border-radius: 14px;
            max-width: 78%;
            animation: msgSlide .3s;
            line-height: 1.5;
            font-size: .88rem;
        }
        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            background: var(--ps-gradient);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.ai {
            background: rgba(255, 255, 255, .06);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--ps-border);
        }
        .ai-input-bar {
            padding: .8rem 1.3rem;
            border-top: 1px solid var(--ps-border);
            display: flex;
            gap: .6rem;
            background: rgba(10, 10, 10, .5);
        }
        .ai-input-bar input {
            flex: 1;
        }
        .ai-status {
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .3rem .8rem;
            background: rgba(0, 180, 216, .08);
            border-radius: 20px;
            font-size: .75rem;
            color: var(--ps-cyan);
            border: 1px solid rgba(0, 180, 216, .18);
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ps-cyan);
            animation: statusPulse 2s ease-in-out infinite;
        }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .loading-dots {
            display: inline-flex;
            gap: 3px;
        }
        .loading-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ps-cyan);
            animation: loadingDot 1.4s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes loadingDot {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        @media(max-width:768px) {
            .ps5-top-nav {
                gap: 0.8rem;
                padding: 0.5rem 0.8rem;
            }
            .ps5-nav-icon .icon-square {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .ps5-nav-icon.active .icon-square {
                width: 44px;
                height: 44px;
                font-size: 1.2rem;
            }
            .sidebar {
                width: 100%;
                min-width: 100%;
                position: fixed;
                top: 80px;
                z-index: 50;
                height: calc(100vh - 80px);
            }
            .content-area {
                padding: .8rem;
            }
        }
    </style>
</head>
<body>
    <div class="ps-background">
        <div class="ps-bg-gradient"></div>
        <div class="ps-particles" id="particles"></div>
    </div>
    <div id="toastContainer"></div>

    <!-- ==================== 全屏登录界面 ==================== -->
    <div class="fullscreen-login" id="fullscreenLogin">
        <div class="login-container">
            <div class="login-logo">2班</div>
            <h2 id="loginTitle">🔐 登录</h2>
            <p id="loginSubtitle">2班 · 智慧班级平台</p>
            <label>选择身份</label>
            <select id="loginIdentity">
                <option value="teacher">👨‍🏫 老师（含班主任）</option>
                <option value="parent">👨‍👩‍👧 家长</option>
                <option value="student">🎒 学生</option>
                <option value="admin">👑 管理员</option>
                <option value="host">💻 主机端（班级电脑）</option>
            </select>
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
            <button class="btn btn-primary" onclick="handleLogin()">✅ 登录</button>
            <span class="toggle-link" id="loginToggle" onclick="toggleLoginMode()">还没有账号？去注册</span>
        </div>
    </div>

    <!-- ==================== 主应用（登录后可见） ==================== -->
    <div class="app-container" id="mainApp" style="display:none">
        <!-- PS5 风格顶端导航栏 -->
        <header class="ps5-top-nav" id="topNav">
            <div class="ps5-nav-icon active" data-page="home" onclick="navigateTo('home')">
                <div class="icon-square"><i class="fas fa-home"></i></div>
                <span class="icon-label">主页</span>
            </div>
            <div class="ps5-nav-icon" data-page="ai" onclick="navigateTo('ai')">
                <div class="icon-square"><i class="fas fa-robot"></i></div>
                <span class="icon-label">AI</span>
            </div>
            <div class="ps5-nav-icon" data-page="community" onclick="navigateTo('community')">
                <div class="icon-square"><i class="fas fa-users"></i></div>
                <span class="icon-label">社区</span>
            </div>
            <div class="ps5-nav-icon" data-page="messages" onclick="navigateTo('messages')">
                <div class="icon-square"><i class="fas fa-comments"></i></div>
                <span class="icon-label">消息</span>
            </div>
            <div class="ps5-nav-icon" data-page="schedule" onclick="navigateTo('schedule')">
                <div class="icon-square"><i class="fas fa-calendar"></i></div>
                <span class="icon-label">日程</span>
            </div>
            <div class="ps5-nav-icon" data-page="attendance" onclick="navigateTo('attendance')">
                <div class="icon-square"><i class="fas fa-clipboard-check"></i></div>
                <span class="icon-label">考勤</span>
            </div>
            <div class="ps5-nav-icon" data-page="grades" onclick="navigateTo('grades')">
                <div class="icon-square"><i class="fas fa-chart-bar"></i></div>
                <span class="icon-label">成绩</span>
            </div>
            <div class="ps5-nav-icon" data-page="files" onclick="navigateTo('files')">
                <div class="icon-square"><i class="fas fa-folder"></i></div>
                <span class="icon-label">文件</span>
            </div>
            <div class="ps5-nav-icon" data-page="random" onclick="navigateTo('random')" id="randomNavIcon">
                <div class="icon-square"><i class="fas fa-shuffle"></i></div>
                <span class="icon-label">抽选</span>
            </div>

            <div class="nav-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索..." id="globalSearch" onkeypress="if(event.key==='Enter')performSearch()">
                </div>
                <div class="user-badge" id="userBadge"></div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar hidden" id="chatSidebar">
                <div class="sidebar-header"><i class="fas fa-comment-dots"></i> 群聊</div>
                <ul class="sidebar-list" id="groupList"></ul>
            </aside>
            <main class="content-area" id="mainContent"></main>
        </div>
    </div>

    <!-- 通用模态框 -->
    <div class="modal-overlay hidden" id="generalModal">
        <div class="modal-content" id="generalModalContent"></div>
    </div>

    <script>
        // ==================== 背景粒子 ====================
        (function() {
            const pc = document.getElementById('particles');
            const colors = ['#00B4D8', '#0070CC', '#003791', '#FFFFFF'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                const s = Math.random() * 3 + 2;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = Math.random() * 10 + 8 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                pc.appendChild(p);
            }
        })();

        // ==================== 数据库 ====================
        const DB_KEY = 'class2_database_v9';
        const PRESET_ADMIN = { id: 'admin001', username: 'admin', password: 'class2admin2024', role: 'admin', name: '管理员' };
        const PRESET_HOST = { id: 'host001', username: 'host', password: 'class2host2024', role: 'host', name: '班级电脑' };

        function getDB() {
            let db = localStorage.getItem(DB_KEY);
            if (!db) {
                db = JSON.stringify({
                    users: [
                        { ...PRESET_ADMIN }, { ...PRESET_HOST },
                        { id: 'u3', username: 'teacher1', password: '123456', role: 'teacher', name: '张老师' },
                        { id: 'u4', username: 'student1', password: '123456', role: 'student', name: '李华', studentId: 'A12' },
                        { id: 'u5', username: 'parent1', password: '123456', role: 'parent', name: '李华家长', linkedStudent: 'A12' }
                    ],
                    messages: { teacher: [], class: [], parent: [], student: [] },
                    posts: [],
                    comments: [],
                    schedules: [],
                    grades: [],
                    files: [],
                    attendance: [],
                    leaveRequests: [],
                    nextId: 200
                });
                localStorage.setItem(DB_KEY, db);
            } else {
                db = JSON.parse(db);
                let needsSave = false;
                if (!db.users.find(u => u.id === 'admin001')) { db.users.push({ ...PRESET_ADMIN });
                    needsSave = true; }
                if (!db.users.find(u => u.id === 'host001')) { db.users.push({ ...PRESET_HOST });
                    needsSave = true; }
                if (!db.attendance) { db.attendance = [];
                    needsSave = true; }
                if (!db.leaveRequests) { db.leaveRequests = [];
                    needsSave = true; }
                if (needsSave) localStorage.setItem(DB_KEY, JSON.stringify(db));
            }
            return db;
        }

        function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        function genId() { const db = getDB();
            db.nextId++;
            saveDB(db); return 'id' + db.nextId; }

        const STORAGE_KEY_CURRENT = 'class2_currentUser_v9';
        const SK_KEY = 'deepseek_api_key_v7';
        let currentUser = JSON.parse(localStorage.getItem(STORAGE_KEY_CURRENT) || 'null');
        let loginMode = 'login';
        let currentPage = 'home';
        let deepseekApiKey = localStorage.getItem(SK_KEY) || '';
        let conversationHistory = [];
        let currentGroup = 'class';
        let postSortOrder = 'newest';

        function toast(m, t = '') {
            const c = document.getElementById('toastContainer');
            const d = document.createElement('div');
            d.className = `toast ${t}`;
            d.textContent = m;
            c.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        function saveCU() {
            currentUser ? localStorage.setItem(STORAGE_KEY_CURRENT, JSON.stringify(currentUser)) : localStorage.removeItem(STORAGE_KEY_CURRENT);
        }

        function roleName(r) { return { admin: '管理员', teacher: '老师', parent: '家长', student: '学生', host: '主机端' } [r] || r; }

        function getCurrentUserName() {
            if (!currentUser) return '';
            const db = getDB();
            const u = db.users.find(u => u.id === currentUser.id);
            return u ? u.name : currentUser.username;
        }

        // ==================== 全屏登录 ====================
        function toggleLoginMode() {
            loginMode = loginMode === 'login' ? 'register' : 'login';
            document.getElementById('loginTitle').textContent = loginMode === 'login' ? '🔐 登录' : '📝 注册';
            document.getElementById('loginToggle').textContent = loginMode === 'login' ? '还没有账号？去注册' : '已有账号？去登录';
            // 注册时隐藏管理员和主机端选项
            const sel = document.getElementById('loginIdentity');
            if (loginMode === 'register') {
                sel.innerHTML = `
                    <option value="teacher">👨‍🏫 老师（含班主任）</option>
                    <option value="parent">👨‍👩‍👧 家长</option>
                    <option value="student">🎒 学生</option>`;
            } else {
                sel.innerHTML = `
                    <option value="teacher">👨‍🏫 老师（含班主任）</option>
                    <option value="parent">👨‍👩‍👧 家长</option>
                    <option value="student">🎒 学生</option>
                    <option value="admin">👑 管理员</option>
                    <option value="host">💻 主机端（班级电脑）</option>`;
            }
        }

        function handleLogin() {
            const identity = document.getElementById('loginIdentity').value;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) { toast('⚠️ 请填写完整', 'error'); return; }
            if (username.length < 3 || password.length < 4) { toast('⚠️ 用户名≥3字符，密码≥4字符', 'error'); return; }
            const db = getDB();
            if (loginMode === 'register') {
                if (['admin', 'host'].includes(identity)) { toast('⚠️ 无法注册管理员/主机端账号', 'error'); return; }
                if (db.users.find(u => u.username === username)) { toast('⚠️ 用户名已存在', 'error'); return; }
                db.users.push({ id: genId(), username, password, role: identity, name: username, studentId: identity === 'student' ? `A${Math.floor(Math.random()*26)+1}` : undefined });
                saveDB(db);
                toast('✅ 注册成功！请登录', 'success');
                loginMode = 'login';
                toggleLoginMode();
                return;
            }
            // 登录
            const u = db.users.find(u => u.username === username && u.password === password && u.role === identity);
            if (!u) { toast('❌ 用户名、密码或身份不匹配', 'error'); return; }
            currentUser = { id: u.id, username: u.username, role: u.role, studentId: u.studentId };
            saveCU();
            conversationHistory = [];
            document.getElementById('fullscreenLogin').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            renderAll();
            toast(`👋 欢迎，${u.name||u.username}！`, 'success');
        }

        function logout() {
            if (confirm('确定退出？')) {
                currentUser = null;
                conversationHistory = [];
                saveCU();
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('fullscreenLogin').classList.remove('hidden');
                loginMode = 'login';
                toggleLoginMode();
                toast('👋 已退出');
            }
        }

        // ==================== DeepSeek API ====================
        async function callDeepSeek(msg) {
            if (!deepseekApiKey) return simulateAI(msg);
            try {
                const messages = [
                    { role: 'system', content: '你是C2 Intelligence，2班智慧班级平台的AI助手。' },
                    ...conversationHistory.slice(-12),
                    { role: 'user', content: msg }
                ];
                const r = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${deepseekApiKey}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: .7, max_tokens: 2000 })
                });
                if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${r.status}`); }
                const d = await r.json();
                const reply = d.choices[0].message.content;
                conversationHistory.push({ role: 'user', content: msg }, { role: 'assistant', content: reply });
                return reply;
            } catch (e) { return `❌ API错误: ${e.message}\n\n离线模式...`; }
        }

        function simulateAI(msg) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const reply = `收到："${msg}"。\n\n💡 设置DeepSeek API Key获得更强大回答。`;
                    conversationHistory.push({ role: 'user', content: msg }, { role: 'assistant', content: reply });
                    resolve(reply);
                }, 600 + Math.random() * 800);
            });
        }

        function setApiKey() {
            const key = prompt('请输入 DeepSeek API Key:\n\n获取地址：platform.deepseek.com', deepseekApiKey);
            if (key !== null && key.trim()) {
                deepseekApiKey = key.trim();
                localStorage.setItem(SK_KEY, deepseekApiKey);
                conversationHistory = [];
                toast('✅ API Key 已保存！', 'success');
                renderAll();
            }
        }

        function performSearch() {
            const query = document.getElementById('globalSearch').value.trim().toLowerCase();
            if (!query) { toast('请输入搜索内容', 'error'); return; }
            const db = getDB();
            const results = {
                posts: db.posts.filter(p => p.title.toLowerCase().includes(query) || p.content.toLowerCase().includes(query)),
                schedules: db.schedules.filter(s => s.title.toLowerCase().includes(query)),
                files: db.files.filter(f => f.name.toLowerCase().includes(query)),
                query: query
            };
            showSearchResults(results);
        }

        function showSearchResults(r) {
            const modal = document.getElementById('generalModal');
            document.getElementById('generalModalContent').innerHTML = `
                <h3>🔍 搜索："${r.query}"</h3>
                ${r.posts.length>0?`<h4>📝 帖子 (${r.posts.length})</h4>${r.posts.map(p=>`<p>${p.title}</p>`).join('')}`:''}
                ${r.schedules.length>0?`<h4>📅 日程 (${r.schedules.length})</h4>${r.schedules.map(s=>`<p>${s.title}</p>`).join('')}`:''}
                ${r.files.length>0?`<h4>📁 文件 (${r.files.length})</h4>${r.files.map(f=>`<p>${f.name}</p>`).join('')}`:''}
                ${r.posts.length===0&&r.schedules.length===0&&r.files.length===0?'<p style="opacity:.5">未找到结果</p>':''}
                <button class="btn btn-outline btn-sm" style="width:100%;margin-top:1rem" onclick="closeGeneralModal()">关闭</button>`;
            modal.classList.remove('hidden');
        }

        function closeGeneralModal() { document.getElementById('generalModal').classList.add('hidden'); }

        // ==================== 渲染引擎 ====================
        function renderAll() {
            if (!currentUser) return;
            renderUserBadge();
            renderChatSidebar();
            renderMain();
            updateNav();
        }

        function renderUserBadge() {
            const c = document.getElementById('userBadge');
            const userName = getCurrentUserName();
            c.innerHTML = `
                ${currentUser.role==='admin'?'👑 ':currentUser.role==='host'?'💻 ':''}<i class="fas fa-user-circle"></i> ${userName||currentUser.username}
                <span class="role-tag ${currentUser.role==='admin'?'admin':''}">${roleName(currentUser.role)}</span>`;
        }

        function renderChatSidebar() {
            const s = document.getElementById('chatSidebar');
            if (currentPage !== 'messages') { s.classList.add('hidden'); return; }
            s.classList.remove('hidden');
            const groups = [
                { id: 'teacher', name: '👨‍🏫 教师群', icon: 'fa-chalkboard-teacher', roles: ['teacher', 'admin'] },
                { id: 'class', name: '🏫 班级群', icon: 'fa-school', roles: ['teacher', 'student', 'parent', 'host', 'admin'] },
                { id: 'parent', name: '👨‍👩‍👧 家长群', icon: 'fa-user-friends', roles: ['parent'] },
                { id: 'student', name: '🎒 学生群', icon: 'fa-graduation-cap', roles: ['student'] }
            ];
            const ug = groups.filter(g => g.roles.includes(currentUser.role));
            const l = document.getElementById('groupList');
            l.innerHTML = ug.map(g => `<li class="sidebar-item${currentGroup===g.id?' active':''}" data-group="${g.id}" onclick="switchGroup('${g.id}')"><i class="fas ${g.icon}"></i> ${g.name}</li>`).join('');
        }

        function switchGroup(id) { currentGroup = id;
            renderAll(); }

        function renderMain() {
            const m = document.getElementById('mainContent');
            switch (currentPage) {
                case 'home':
                    renderHomePage(m);
                    break;
                case 'ai':
                    renderAIPage(m);
                    break;
                case 'community':
                    renderCommunityPage(m);
                    break;
                case 'messages':
                    renderMessagesPage(m);
                    break;
                case 'schedule':
                    renderSchedulePage(m);
                    break;
                case 'attendance':
                    renderAttendancePage(m);
                    break;
                case 'grades':
                    renderGradesPage(m);
                    break;
                case 'files':
                    renderFilesPage(m);
                    break;
                case 'random':
                    renderRandomPage(m);
                    break;
                default:
                    renderHomePage(m);
            }
        }

        function updateNav() {
            document.querySelectorAll('.ps5-nav-icon').forEach(icon => {
                icon.classList.toggle('active', icon.dataset.page === currentPage);
            });
            // 随机抽选图标仅主机端和管理员可见
            const randomIcon = document.getElementById('randomNavIcon');
            if (randomIcon) {
                randomIcon.style.display = (currentUser && (currentUser.role === 'host' || currentUser.role === 'admin')) ? 'flex' : 'none';
            }
        }

        function navigateTo(p) { currentPage = p;
            renderAll();
            document.querySelector('.content-area').scrollTop = 0; }

        // ==================== 主页 ====================
        function renderHomePage(m) {
            const db = getDB();
            const visiblePosts = getVisiblePosts(db).slice(0, 5);
            const upcomingSchedules = db.schedules.sort((a, b) => new Date(a.date) - new Date(b.date)).filter(s => new Date(s.date) >= new Date(new Date().toDateString())).slice(0, 4);
            const recentFiles = db.files.sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 4);
            const todayAttendance = db.attendance.filter(a => a.date === new Date().toISOString().split('T')[0]);
            const presentCount = todayAttendance.filter(a => a.status === 'present').length;
            const totalStudents = db.users.filter(u => u.role === 'student').length;

            m.innerHTML = `
            <div class="welcome-hero" style="background:linear-gradient(135deg,rgba(0,55,145,0.4),rgba(0,112,204,0.3),rgba(0,180,216,0.2));border-radius:24px;padding:2rem;margin-bottom:1.5rem;border:1px solid var(--ps-border)">
                <h1 style="font-size:2rem;font-weight:900;background:var(--ps-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">👋 欢迎回来, ${getCurrentUserName()}</h1>
                <p style="opacity:.7">📅 ${new Date().toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
                <div style="display:flex;gap:2rem;margin-top:1rem;flex-wrap:wrap">
                    <div style="text-align:center"><div style="font-size:1.8rem;font-weight:900;font-family:'Space Grotesk',sans-serif;background:var(--ps-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${db.users.length}</div><div style="font-size:.75rem;opacity:.6">成员</div></div>
                    <div style="text-align:center"><div style="font-size:1.8rem;font-weight:900;font-family:'Space Grotesk',sans-serif;background:var(--ps-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${presentCount}/${totalStudents}</div><div style="font-size:.75rem;opacity:.6">今日出勤</div></div>
                    <div style="text-align:center"><div style="font-size:1.8rem;font-weight:900;font-family:'Space Grotesk',sans-serif;background:var(--ps-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${db.posts.length}</div><div style="font-size:.75rem;opacity:.6">帖子</div></div>
                </div>
            </div>
            <div class="grid grid-2">
                <div class="card"><h3>📰 最新动态</h3>${visiblePosts.length===0?'<p style="opacity:.5">暂无帖子</p>':visiblePosts.map(p=>`<p style="font-size:.85rem;margin:.3rem 0">${p.title} <span style="opacity:.5">- ${p.authorName}</span></p>`).join('')}</div>
                <div class="card"><h3>📅 近期日程</h3>${upcomingSchedules.length===0?'<p style="opacity:.5">暂无日程</p>':upcomingSchedules.map(s=>`<p style="font-size:.85rem;margin:.3rem 0">📅 ${s.date} - ${s.title}</p>`).join('')}</div>
                <div class="card"><h3>📁 最近文件</h3>${recentFiles.length===0?'<p style="opacity:.5">暂无文件</p>':recentFiles.map(f=>`<p style="font-size:.85rem;margin:.3rem 0">📄 ${f.name}</p>`).join('')}</div>
                <div class="card"><h3>📊 今日考勤</h3><p>已签到：<strong>${presentCount}</strong> / ${totalStudents}</p><p style="font-size:.8rem;opacity:.6">未签到学生将自动标记</p></div>
            </div>`;
        }

        function getVisiblePosts(db) {
            if (!currentUser) return [];
            if (currentUser.role === 'admin') return db.posts;
            return db.posts.filter(p => {
                if (p.visibility === 'public') return true;
                if (p.visibility === 'class') return true;
                if (p.visibility === 'teachers' && (currentUser.role === 'teacher' || currentUser.role === 'admin')) return true;
                if (p.visibility === 'private' && p.authorId === currentUser.id) return true;
                return false;
            });
        }

        // ==================== AI页面 ====================
        function renderAIPage(m) {
            m.innerHTML = `
            <div class="ai-full-chat">
                <div class="ai-chat-header"><h3 style="margin:0"><i class="fas fa-robot"></i> C2 Intelligence</h3><div style="display:flex;gap:.5rem"><div class="ai-status" id="aiStatus"><span class="status-dot"></span><span>${deepseekApiKey?'DeepSeek V3':'离线'}</span></div><button class="btn btn-outline btn-sm" onclick="setApiKey()"><i class="fas fa-key"></i></button></div></div>
                <div class="ai-messages" id="aiMessages"><div class="msg ai"><div class="msg-label">C2</div><div>👋 你好！${deepseekApiKey?'✨ DeepSeek V3':'💡 离线模式'}</div></div></div>

        .control-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        /* 主内容区域 */
        .main-content {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* 学号选择区域 */
        .students-section {
            flex: 1;
            min-width: 300px;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .student-item {
            position: relative;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .student-item:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .student-item.selected {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
        }

        .student-item.selected::after {
            content: '✓';
            position: absolute;
            top: 2px;
            right: 5px;
            font-size: 0.8rem;
            color: #2ecc71;
            font-weight: bold;
        }

        /* 被排除的学号 - 完全无视觉变化，仅禁止交互 */
        .student-item.excluded {
            cursor: not-allowed;
            /* 移除所有视觉样式变化，保持原样 */
        }

        /* 右侧抽选区域 */
        .draw-section {
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 30px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 大圆圈显示 */
        .draw-circle {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 4px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            box-shadow:
                0 0 60px rgba(52, 152, 219, 0.3),
                inset 0 0 60px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .draw-circle.rolling {
            animation: pulse 0.5s ease-in-out infinite;
            border-color: #3498db;
            box-shadow: 0 0 80px rgba(52, 152, 219, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .draw-circle.winner {
            border-color: #2ecc71;
            box-shadow: 0 0 100px rgba(46, 204, 113, 0.5);
            background: linear-gradient(145deg, rgba(46, 204, 113, 0.2), rgba(39, 174, 96, 0.1));
        }

        /* Start/Stop 按钮 */
        .action-btn {
            width: 200px;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .action-btn.start {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.4);
        }

        .action-btn.stop {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
            animation: shake 0.5s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        /* 历史记录 */
        .history-section {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .history-title {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-toggle {
            transition: transform 0.3s ease;
        }

        .history-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 150px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .history-list.collapsed {
            max-height: 0;
            overflow: hidden;
            margin: 0;
        }

        .history-item {
            padding: 5px 12px;
            background: rgba(52, 152, 219, 0.3);
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid rgba(52, 152, 219, 0.5);
        }

        /* 屏幕边框闪烁效果 */
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 0 solid rgba(231, 76, 60, 0.8);
            pointer-events: none;
            z-index: 9999;
            transition: border-width 0.1s ease;
        }

        .screen-flash.active {
            border-width: 20px;
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% { border-width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { border-width: 20px; opacity: 0; }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
           
            .draw-section {
                width: 100%;
            }
           
            .draw-circle {
                width: 200px;
                height: 200px;
                font-size: 3rem;
            }
           
            .range-selector h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 范围选择页面 -->
    <div class="range-selector" id="rangeSelector">
        <h1>C2 Intelligence</h1>
        <div class="range-options">
            <button class="range-btn" onclick="selectRange('A')">
                <div>Class A</div>
                <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">A1 ~ A26</div>
            </button>
            <button class="range-btn" onclick="selectRange('B')">
                <div>Class B</div>
                <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">B1 ~ B25</div>
            </button>
            <button class="range-btn" onclick="selectRange('ALL')">
                <div>Whole Class</div>
                <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">A1~A26 + B1~B25</div>
            </button>
        </div>
    </div>

    <!-- 抽选操作面板 -->
    <div class="draw-panel" id="drawPanel">
        <div class="panel-header">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </button>
            <div class="range-display" id="rangeDisplay">Class A (A1~A26)</div>
        </div>

        <div class="control-bar">
            <button class="control-btn" onclick="selectAll()">Select All</button>
            <button class="control-btn" onclick="deselectAll()">Deselect All</button>
            <button class="control-btn" onclick="resetAll()">Reset</button>
        </div>

        <div class="main-content">
            <div class="students-section">
                <div class="students-grid" id="studentsGrid">
                    <!-- 学号将通过JS动态生成 -->
                </div>
            </div>

            <div class="draw-section">
                <div class="mode-selector">
                    <button class="mode-btn active" onclick="setMode('auto')">Auto</button>
                    <button class="mode-btn" onclick="setMode('manual')">Manual</button>
                </div>

                <div class="draw-circle" id="drawCircle">?</div>

                <button class="action-btn start" id="actionBtn" onclick="toggleDraw()">Start</button>

                <div class="history-section">
                    <div class="history-header" onclick="toggleHistory()">
                        <div class="history-title">
                            <span>History</span>
                            <span id="historyCount" style="font-size: 0.8rem; opacity: 0.6;">(0/51)</span>
                        </div>
                        <svg class="history-toggle" id="historyToggle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </div>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 屏幕闪烁层 -->
    <div class="screen-flash" id="screenFlash"></div>

    <script>
        // 全局状态
        let currentRange = '';
        let students = [];
        let selectedStudents = new Set();
        let excludedStudents = new Set();
        let history = [];
        let currentMode = 'auto';
        let isDrawing = false;
        let drawTimeout = null;
        let animationFrame = null;
        let longPressTimer = null;
        let startTime = 0;
        const BASE_SPEED = 50; // Manual模式的基础速度（也是Auto模式的初始速度）

        // 生成学号列表
        function generateStudents(range) {
            const list = [];
            if (range === 'A' || range === 'ALL') {
                for (let i = 1; i <= 26; i++) {
                    list.push(`A${i}`);
                }
            }
            if (range === 'B' || range === 'ALL') {
                for (let i = 1; i <= 25; i++) {
                    list.push(`B${i}`);
                }
            }
            return list;
        }

        // 选择范围
        function selectRange(range) {
            currentRange = range;
            students = generateStudents(range);
           
            // 更新显示文本
            let displayText = '';
            if (range === 'A') displayText = 'Class A (A1~A26)';
            else if (range === 'B') displayText = 'Class B (B1~B25)';
            else displayText = 'Whole Class (A1~A26 + B1~B25)';
            document.getElementById('rangeDisplay').textContent = displayText;
           
            // 重置状态
            selectedStudents = new Set(students);
            excludedStudents = new Set();
            history = [];
            updateHistoryDisplay();
           
            // 生成学号网格
            renderStudents();
           
            // 切换页面
            document.getElementById('rangeSelector').style.display = 'none';
            document.getElementById('drawPanel').style.display = 'block';
        }

        // 返回上一层
        function goBack() {
            stopDraw();
            document.getElementById('drawPanel').style.display = 'none';
            document.getElementById('rangeSelector').style.display = 'flex';
        }

        // 渲染学号网格
        function renderStudents() {
            const grid = document.getElementById('studentsGrid');
            grid.innerHTML = '';
           
            students.forEach(id => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.textContent = id;
                div.dataset.id = id;
               
                if (selectedStudents.has(id)) {
                    div.classList.add('selected');
                }
                if (excludedStudents.has(id)) {
                    div.classList.add('excluded');
                }
               
                // 点击选择/取消
                div.addEventListener('click', (e) => {
                    if (excludedStudents.has(id)) return;
                    toggleStudent(id);
                });
               
                // 长按功能（3秒）
                div.addEventListener('mousedown', (e) => startLongPress(id, div));
                div.addEventListener('touchstart', (e) => startLongPress(id, div), {passive: true});
                div.addEventListener('mouseup', (e) => endLongPress(id, div));
                div.addEventListener('touchend', (e) => endLongPress(id, div));
                div.addEventListener('mouseleave', () => cancelLongPress());
                div.addEventListener('touchcancel', () => cancelLongPress());
               
                grid.appendChild(div);
            });
        }

        // 切换学号选择状态
        function toggleStudent(id) {
            if (excludedStudents.has(id)) return;
           
            const div = document.querySelector(`[data-id="${id}"]`);
            if (selectedStudents.has(id)) {
                selectedStudents.delete(id);
                div.classList.remove('selected');
            } else {
                selectedStudents.add(id);
                div.classList.add('selected');
            }
        }

        // 长按开始
        function startLongPress(id, div) {
            if (excludedStudents.has(id)) return;
           
            // 获取当前可选的学号数量（排除已排除的）
            const availableCount = students.filter(s => !excludedStudents.has(s)).length;
            if (availableCount < 3) return; // 需要至少3个才能触发
           
            longPressTimer = setTimeout(() => {
                // 标记为排除（从选中状态中移除，但不改变视觉样式）
                excludedStudents.add(id);
                selectedStudents.delete(id);
                div.classList.add('excluded');
                // 注意：不再移除 selected 类，保持外观不变
               
                // 屏幕边框变红闪烁
                const flash = document.getElementById('screenFlash');
                flash.classList.add('active');
                setTimeout(() => {
                    flash.classList.remove('active');
                }, 300);
               
                longPressTimer = null;
            }, 3000);
        }

        // 长按结束
        function endLongPress(id, div) {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        // 取消长按
        function cancelLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        // 全选
        function selectAll() {
            students.forEach(id => {
                if (!excludedStudents.has(id)) {
                    selectedStudents.add(id);
                }
            });
            renderStudents();
        }

        // 全不选
        function deselectAll() {
            selectedStudents.clear();
            renderStudents();
        }

        // 重置
        function resetAll() {
            selectedStudents = new Set(students);
            excludedStudents.clear();
            history = [];
            updateHistoryDisplay();
            document.getElementById('drawCircle').textContent = '?';
            document.getElementById('drawCircle').className = 'draw-circle';
            renderStudents();
        }

        // 设置模式
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // 切换抽选状态
        function toggleDraw() {
            if (isDrawing) {
                stopDraw();
            } else {
                startDraw();
            }
        }

        // 开始抽选
        function startDraw() {
            const availableStudents = Array.from(selectedStudents).filter(id => !excludedStudents.has(id));
            if (availableStudents.length === 0) return;
           
            isDrawing = true;
            const btn = document.getElementById('actionBtn');
            const circle = document.getElementById('drawCircle');
           
            btn.textContent = 'Stop';
            btn.classList.remove('start');
            btn.classList.add('stop');
            circle.classList.add('rolling');
            circle.classList.remove('winner');
           
            startTime = performance.now();
           
            if (currentMode === 'auto') {
                // Auto模式：5秒内由快至慢，初始速度与Manual相同
                animateAuto(availableStudents);
            } else {
                // Manual模式：匀速滚动
                animateManual(availableStudents);
            }
        }

        // Auto模式动画 - 5秒内由快至慢直至停止
        // 初始速度与Manual模式相同（BASE_SPEED = 50ms）
        function animateAuto(availableStudents) {
            const duration = 5000; // 5秒总时长
            const circle = document.getElementById('drawCircle');
           
            function step(currentTime) {
                if (!isDrawing) return;
               
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
               
                // 计算当前间隔时间（由快到慢）
                // 初始间隔 = BASE_SPEED (50ms，与Manual相同)
                // 最终间隔 = 500ms（缓慢停止）
                // 使用指数衰减实现自然的减速感
                const initialInterval = BASE_SPEED;
                const finalInterval = 500;
                const currentInterval = initialInterval + (finalInterval - initialInterval) * Math.pow(progress, 2);
               
                // 显示随机学号
                const randomIndex = Math.floor(Math.random() * availableStudents.length);
                circle.textContent = availableStudents[randomIndex];
               
                if (progress < 1) {
                    // 继续动画，根据当前速度设置下一帧
                    drawTimeout = setTimeout(() => {
                        animationFrame = requestAnimationFrame((time) => step(time));
                    }, currentInterval);
                } else {
                    // 5秒结束，自动停止
                    stopDraw();
                }
            }
           
            animationFrame = requestAnimationFrame((time) => step(time));
        }

        // Manual模式动画 - 匀速快速滚动（固定BASE_SPEED）
        function animateManual(availableStudents) {
            const circle = document.getElementById('drawCircle');
           
            function step() {
                if (!isDrawing) return;
               
                const randomIndex = Math.floor(Math.random() * availableStudents.length);
                circle.textContent = availableStudents[randomIndex];
               
                drawTimeout = setTimeout(() => {
                    animationFrame = requestAnimationFrame(step);
                }, BASE_SPEED); // 固定使用BASE_SPEED（50ms）
            }
           
            animationFrame = requestAnimationFrame(step);
        }

        // 停止抽选
        function stopDraw() {
            if (!isDrawing) return;
           
            isDrawing = false;
           
            // 清除所有定时器
            if (drawTimeout) {
                clearTimeout(drawTimeout);
                drawTimeout = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
           
            const btn = document.getElementById('actionBtn');
            const circle = document.getElementById('drawCircle');
           
            btn.textContent = 'Start';
            btn.classList.remove('stop');
            btn.classList.add('start');
            circle.classList.remove('rolling');
            circle.classList.add('winner');
           
            // 记录历史
            const winner = circle.textContent;
            if (winner && winner !== '?' && !history.includes(winner)) {
                history.unshift(winner);
                if (history.length > 51) history.pop();
                updateHistoryDisplay();
            }
        }

        // 更新历史记录显示
        function updateHistoryDisplay() {
            const list = document.getElementById('historyList');
            const count = document.getElementById('historyCount');
           
            count.textContent = `(${history.length}/51)`;
            list.innerHTML = '';
           
            history.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = `${history.length - index}. ${item}`;
                list.appendChild(div);
            });
        }

        // 切换历史记录折叠
        function toggleHistory() {
            const list = document.getElementById('historyList');
            const toggle = document.getElementById('historyToggle');
           
            list.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        }

        // 防止空格键滚动页面
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>
