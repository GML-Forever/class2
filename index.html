<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2班 · 智慧班级平台</title>
    <style>
        :root {
            --mac-bg: #1e1e2e;
            --mac-sidebar: rgba(30, 30, 46, 0.85);
            --mac-card: rgba(255, 255, 255, 0.08);
            --mac-border: rgba(255, 255, 255, 0.1);
            --mac-text: #f5f5f7;
            --mac-text-secondary: rgba(255, 255, 255, 0.55);
            --mac-accent: #007aff;
            --mac-red: #ff5f57;
            --mac-yellow: #febc2e;
            --mac-green: #28c840;
            --mac-radius: 12px;
            --dock-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
            background: #0a0a0f; color: var(--mac-text); height: 100vh; overflow: hidden;
            user-select: none; -webkit-font-smoothing: antialiased; -webkit-user-select: none;
        }

        .mac-wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 20%, #0f3460 40%, #1a1a2e 60%, #16213e 80%, #0f3460 100%);
            background-size: 400% 400%; animation: wallpaperShift 30s ease infinite;
        }
        .mac-wallpaper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(100,149,237,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 30%, rgba(138,43,226,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(0,191,255,0.08) 0%, transparent 50%);
        }
        @keyframes wallpaperShift {
            0%,100%{background-position:0% 50%} 25%{background-position:100% 0%}
            50%{background-position:100% 100%} 75%{background-position:0% 100%}
        }

        /* 菜单栏 */
        .mac-menubar {
            position: fixed; top: 0; left: 0; right: 0; height: 28px; z-index: 1000;
            background: rgba(30,30,46,0.7); backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.06); display: flex;
            align-items: center; justify-content: space-between; padding: 0 16px;
            font-size: 12px; font-weight: 500; letter-spacing: -0.2px;
        }
        .mac-menubar-left { display: flex; align-items: center; gap: 20px; }
        .apple-logo { font-size: 14px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .apple-logo:hover { opacity: 1; }
        .menu-item { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; font-weight: 500; }
        .menu-item:hover { opacity: 1; }
        .mac-menubar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; }
        .menu-icon { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; position: relative; }
        .menu-icon:hover { opacity: 1; }
        .live-time { font-weight: 600; font-variant-numeric: tabular-nums; font-family: 'SF Mono','Menlo','Consolas',monospace; letter-spacing: 0.5px; opacity: 0.9; }

        /* 控制中心 */
        .control-center-toggle { cursor: pointer; }
        .control-center-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000;
            background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center;
        }
        .control-center-overlay.show { display: flex; }
        .control-center-panel {
            background: rgba(40,40,60,0.9); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 24px;
            width: 360px; max-width: 92vw; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .cc-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .cc-tile {
            flex: 1; min-width: 80px; padding: 16px 12px; border-radius: 16px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .cc-tile:hover { background: rgba(255,255,255,0.12); }
        .cc-tile.active { background: rgba(0,122,255,0.3); border-color: rgba(0,122,255,0.5); }
        .cc-tile .cc-icon { font-size: 28px; margin-bottom: 8px; }
        .cc-tile .cc-label { font-size: 11px; opacity: 0.7; font-weight: 500; }
        .cc-slider { width: 100%; margin: 8px 0; accent-color: var(--mac-accent); }
        .cc-close { width: 100%; margin-top: 8px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; font-family: inherit; }

        /* 桌面 */
        .mac-desktop { position: fixed; top: 28px; left: 0; right: 0; bottom: var(--dock-height); z-index: 1; overflow: hidden; }

        /* 窗口 */
        .mac-window {
            position: absolute; background: rgba(40,40,60,0.75); backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; min-width: 320px; min-height: 200px; overflow: hidden;
            z-index: 10; transition: box-shadow 0.3s; animation: windowOpen 0.3s ease;
        }
        .mac-window.focused { z-index: 100; box-shadow: 0 30px 70px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.2); }
        .mac-window.maximized { top: 0!important; left: 0!important; width: 100%!important; height: 100%!important; border-radius: 0!important; }
        @keyframes windowOpen { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        .window-titlebar {
            display: flex; align-items: center; padding: 14px 16px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06); cursor: move; flex-shrink: 0;
        }
        .window-traffic-lights { display: flex; gap: 8px; margin-right: 12px; }
        .traffic-light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: all 0.2s; }
        .traffic-light.close { background: var(--mac-red); }
        .traffic-light.minimize { background: var(--mac-yellow); }
        .traffic-light.maximize { background: var(--mac-green); }
        .traffic-light:hover { filter: brightness(0.8); transform: scale(1.1); }
        .window-title { flex: 1; text-align: center; font-size: 13px; font-weight: 600; opacity: 0.8; }
        .window-content { flex: 1; overflow-y: auto; padding: 20px; }
        .window-content::-webkit-scrollbar { width: 5px; }
        .window-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .window-resize-handle { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; cursor: se-resize; z-index: 20; }

        /* Dock */
        .mac-dock {
            position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(40,40,60,0.55); backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 6px 10px; display: flex; align-items: flex-end; gap: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: all 0.3s;
        }
        .dock-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.25s ease; padding: 4px 6px; border-radius: 14px; position: relative; }
        .dock-item:hover { transform: translateY(-8px) scale(1.1); background: rgba(255,255,255,0.06); }
        .dock-item.active::after { content: ''; position: absolute; bottom: -4px; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; }
        .dock-icon {
            width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 22px; background: rgba(255,255,255,0.08);
            color: var(--mac-text); transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .dock-item:hover .dock-icon { background: rgba(255,255,255,0.15); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .dock-label { font-size: 10px; opacity: 0; transform: translateY(-5px); transition: all 0.3s; white-space: nowrap; position: absolute; top: -25px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 6px; color: #fff; }
        .dock-item:hover .dock-label { opacity: 1; transform: translateY(0); }

        /* 照片应用 */
        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .photo-thumb { aspect-ratio: 1; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .photo-thumb:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); transform: scale(1.03); }

        /* Apple Music */
        .music-player { text-align: center; padding: 20px; }
        .album-art { width: 180px; height: 180px; border-radius: 16px; background: linear-gradient(135deg, #ff2d55, #ff3b30, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 60px; margin: 0 auto 16px; box-shadow: 0 10px 30px rgba(255,45,85,0.3); }
        .music-controls { display: flex; gap: 20px; justify-content: center; align-items: center; margin: 16px 0; }
        .music-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; font-size: 16px; color: #fff; }
        .music-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-btn.play { width: 56px; height: 56px; font-size: 20px; background: var(--mac-accent); border: none; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 8px 0; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--mac-accent); border-radius: 2px; width: 30%; }

        /* 设置 */
        .settings-sidebar { display: flex; gap: 0; }
        .settings-nav { width: 180px; min-width: 180px; padding: 10px 0; }
        .settings-nav-item { padding: 8px 16px; cursor: pointer; font-size: 13px; opacity: 0.7; transition: all 0.2s; border-radius: 8px; margin: 2px 8px; }
        .settings-nav-item:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .settings-nav-item.active { opacity: 1; background: rgba(0,122,255,0.2); color: var(--mac-accent); }
        .settings-content { flex: 1; padding: 0 20px; }

        /* 考试模式 */
        .exam-mode-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #0a0a0f; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .exam-mode-overlay.show { display: flex; }
        .exam-clock { font-size: 12vw; font-weight: 200; font-family: 'SF Pro Display',-apple-system,sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -4px; color: #fff; text-shadow: 0 0 100px rgba(255,255,255,0.3); line-height: 1; }
        .exam-subject { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--mac-text-secondary); letter-spacing: 2px; }
        .exam-time-range { font-size: 1.2rem; color: var(--mac-text-secondary); margin-bottom: 2rem; opacity: 0.7; }
        .exam-date { font-size: 1.5rem; color: var(--mac-text-secondary); margin-top: 1rem; opacity: 0.6; }
        .exam-settings-btn { position: fixed; bottom: 30px; right: 30px; z-index: 2001; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-family: inherit; }

        /* 随机抽选 */
        .draw-circle-large { width: 200px; height: 200px; border-radius: 50%; background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); border: 4px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; margin: 20px auto; transition: all 0.3s; }
        .draw-circle-large.rolling { animation: pulse 0.5s ease-in-out infinite; border-color: #3498db; box-shadow: 0 0 80px rgba(52,152,219,0.6); }
        .draw-circle-large.winner { border-color: #2ecc71; box-shadow: 0 0 100px rgba(46,204,113,0.5); }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
        .students-grid-draw { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 8px; max-height: 40vh; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .student-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.75rem; }
        .student-cell.selected { background: rgba(46,204,113,0.3); border-color: #2ecc71; }
        .student-cell.excluded { cursor: not-allowed; }

        .card { background: var(--mac-card); border: 1px solid var(--mac-border); border-radius: var(--mac-radius); padding: 20px; margin-bottom: 12px; }
        .btn-primary { background: var(--mac-accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
        input, select, textarea { background: rgba(255,255,255,0.06); border: 1px solid var(--mac-border); color: var(--mac-text); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; width: 100%; }
        @media(max-width:768px){ .dock-icon{width:40px;height:40px;font-size:18px} }
    </style>
</head>
<body>
    <div class="mac-wallpaper"></div>

    <!-- 菜单栏 -->
    <div class="mac-menubar">
        <div class="mac-menubar-left">
            <span class="apple-logo" onclick="openApp('settings')">🍎</span>
            <span class="menu-item">文件</span>
            <span class="menu-item">编辑</span>
            <span class="menu-item">显示</span>
            <span class="menu-item">窗口</span>
            <span class="menu-item">帮助</span>
        </div>
        <div class="mac-menubar-right">
            <span class="menu-icon">🔋 100%</span>
            <span class="menu-icon">📶</span>
            <span class="control-center-toggle menu-icon" onclick="toggleControlCenter()" title="控制中心">🔘</span>
            <span class="live-time" id="menubarTime">--:--:--</span>
        </div>
    </div>

    <!-- 桌面 -->
    <div class="mac-desktop" id="desktop"></div>

    <!-- Dock -->
    <div class="mac-dock" id="macDock">
        <div class="dock-item" data-app="finder" onclick="openApp('finder')"><div class="dock-icon">😊</div><span class="dock-label">访达</span></div>
        <div class="dock-item" data-app="photos" onclick="openApp('photos')"><div class="dock-icon" style="background:linear-gradient(135deg,#ff9c33,#ff6b35,#ff3b30);border-radius:50%">🌸</div><span class="dock-label">照片</span></div>
        <div class="dock-item" data-app="music" onclick="openApp('music')"><div class="dock-icon" style="background:linear-gradient(135deg,#ff2d55,#ff3b30,#ff6b6b);border-radius:50%">🎵</div><span class="dock-label">音乐</span></div>
        <div class="dock-item" data-app="messages" onclick="openApp('messages')"><div class="dock-icon" style="background:linear-gradient(135deg,#34c759,#30d158);border-radius:50%">💬</div><span class="dock-label">信息</span></div>
        <div class="dock-item" data-app="community" onclick="openApp('community')"><div class="dock-icon" style="background:linear-gradient(135deg,#007aff,#5ac8fa);border-radius:50%">👥</div><span class="dock-label">社区</span></div>
        <div class="dock-item" data-app="schedule" onclick="openApp('schedule')"><div class="dock-icon" style="background:linear-gradient(135deg,#ff3b30,#ff6b6b);border-radius:50%">📅</div><span class="dock-label">日历</span></div>
        <div class="dock-item" data-app="files" onclick="openApp('files')"><div class="dock-icon" style="background:linear-gradient(135deg,#007aff,#40a9ff);border-radius:50%">📁</div><span class="dock-label">文件</span></div>
        <div class="dock-item" data-app="ai" onclick="openApp('ai')"><div class="dock-icon" style="background:linear-gradient(135deg,#af52de,#bf5af2);border-radius:50%">🤖</div><span class="dock-label">C2 AI</span></div>
        <div class="dock-item" data-app="random" onclick="openApp('random')"><div class="dock-icon" style="background:linear-gradient(135deg,#ff9500,#ff9f0a);border-radius:50%">🎲</div><span class="dock-label">抽选</span></div>
        <div class="dock-item" data-app="exam" onclick="openApp('exam')"><div class="dock-icon" style="background:linear-gradient(135deg,#5ac8fa,#64d2ff);border-radius:50%">⏰</div><span class="dock-label">考试</span></div>
        <div class="dock-item" data-app="settings" onclick="openApp('settings')"><div class="dock-icon" style="background:linear-gradient(135deg,#8e8e93,#aeaeb2);border-radius:50%">⚙️</div><span class="dock-label">设置</span></div>
    </div>

    <!-- 控制中心 -->
    <div class="control-center-overlay" id="controlCenter" onclick="if(event.target===this)toggleControlCenter()">
        <div class="control-center-panel">
            <h3 style="text-align:center;margin-bottom:16px">控制中心</h3>
            <div class="cc-row">
                <div class="cc-tile active" id="cc-wifi" onclick="toggleCC('wifi')"><div class="cc-icon">📶</div><div class="cc-label">Wi-Fi</div></div>
                <div class="cc-tile active" id="cc-bluetooth" onclick="toggleCC('bluetooth')"><div class="cc-icon">📱</div><div class="cc-label">蓝牙</div></div>
                <div class="cc-tile" id="cc-airdrop" onclick="toggleCC('airdrop')"><div class="cc-icon">📤</div><div class="cc-label">隔空投送</div></div>
            </div>
            <div class="cc-row">
                <div class="cc-tile" style="flex:2">
                    <div class="cc-icon">🔆</div>
                    <div class="cc-label">显示器亮度</div>
                    <input type="range" class="cc-slider" min="0" max="100" value="80" oninput="document.body.style.filter=`brightness(${this.value/100})`">
                </div>
            </div>
            <div class="cc-row">
                <div class="cc-tile" style="flex:2">
                    <div class="cc-icon">🔊</div>
                    <div class="cc-label">音量</div>
                    <input type="range" class="cc-slider" min="0" max="100" value="60">
                </div>
            </div>
            <div class="cc-row">
                <div class="cc-tile" id="cc-darkmode" onclick="toggleDarkMode()"><div class="cc-icon">🌙</div><div class="cc-label">深色模式</div></div>
                <div class="cc-tile" id="cc-dnd" onclick="toggleCC('dnd')"><div class="cc-icon">🔕</div><div class="cc-label">勿扰模式</div></div>
                <div class="cc-tile" onclick="openApp('exam')"><div class="cc-icon">⏰</div><div class="cc-label">考试模式</div></div>
            </div>
            <button class="cc-close" onclick="toggleControlCenter()">关闭</button>
        </div>
    </div>

    <!-- 考试模式 -->
    <div class="exam-mode-overlay" id="examModeOverlay">
        <div class="exam-subject" id="examSubject">数学</div>
        <div class="exam-time-range" id="examTimeRange">08:00 - 10:00</div>
        <div class="exam-clock" id="examClock">--:--:--</div>
        <div class="exam-date" id="examDate"></div>
        <button class="exam-settings-btn" onclick="showExamSettings()">⚙️ 设置</button>
        <button class="exam-settings-btn" style="bottom:80px" onclick="exitExamMode()">✕ 退出</button>
    </div>

    <script>
        // ==================== 数据存储 ====================
        const DB_KEY = 'class2_macos_v3';
        function getDB() {
            let db = localStorage.getItem(DB_KEY);
            if (!db) {
                db = JSON.stringify({
                    messages: { class: [] }, posts: [], schedules: [], grades: [], files: [],
                    attendance: [], leaveRequests: [], photos: [], musicPlaylist: [
                        { title: '校园晨曲', artist: '2班乐团', duration: '3:42' },
                        { title: '午后阳光', artist: '轻音乐', duration: '4:15' },
                        { title: '放学铃声', artist: '原创', duration: '2:30' }
                    ],
                    examSettings: { subject: '数学', startTime: '08:00', endTime: '10:00' },
                    settings: { darkMode: true, wifi: true, bluetooth: true, airdrop: false, dnd: false },
                    currentTrack: 0, isPlaying: false, nextId: 1
                });
                localStorage.setItem(DB_KEY, db);
            }
            return JSON.parse(db);
        }
        function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
        function genId() { const db = getDB(); db.nextId++; saveDB(db); return 'id' + db.nextId; }

        // ==================== 窗口管理 ====================
        let windows = {}, focusedWindow = null, zIndexCounter = 10;
        function createWindow(appId, title, w = 600, h = 400, l = null, t = null) {
            if (windows[appId]) { focusWindow(appId); return; }
            const desktop = document.getElementById('desktop');
            const win = document.createElement('div');
            win.className = 'mac-window focused'; win.id = 'window-' + appId;
            if (!l) l = 50 + Object.keys(windows).length * 30;
            if (!t) t = 50 + Object.keys(windows).length * 30;
            win.style.cssText = `width:${w}px;height:${h}px;left:${l}px;top:${t}px;z-index:${++zIndexCounter}`;
            win.innerHTML = `<div class="window-titlebar" onmousedown="startDrag(event,'${appId}')"><div class="window-traffic-lights"><div class="traffic-light close" onclick="closeWindow('${appId}')"></div><div class="traffic-light minimize" onclick="minimizeWindow('${appId}')"></div><div class="traffic-light maximize" onclick="maximizeWindow('${appId}')"></div></div><div class="window-title">${title}</div></div><div class="window-content" id="content-${appId}"></div><div class="window-resize-handle" onmousedown="startResize(event,'${appId}')"></div>`;
            win.addEventListener('mousedown', () => focusWindow(appId));
            desktop.appendChild(win);
            windows[appId] = { el: win, title, w, h, l, t, minimized: false, maximized: false };
            renderAppContent(appId); updateDockActive(); return win;
        }
        function focusWindow(appId) {
            if (!windows[appId]) { openApp(appId); return; }
            if (windows[appId].minimized) { windows[appId].minimized = false;
                windows[appId].el.style.display = 'flex'; }
            windows[appId].el.style.zIndex = ++zIndexCounter;
            windows[appId].el.classList.add('focused');
            Object.keys(windows).forEach(id => { if (id !== appId) windows[id].el.classList.remove('focused'); });
            focusedWindow = appId; updateDockActive();
        }
        function closeWindow(appId) { if (!windows[appId]) return;
            windows[appId].el.remove(); delete windows[appId]; if (focusedWindow === appId) focusedWindow = null;
            updateDockActive(); }
        function minimizeWindow(appId) { if (!windows[appId]) return;
            windows[appId].minimized = true;
            windows[appId].el.style.display = 'none';
            focusedWindow = null;
            updateDockActive(); }
        function maximizeWindow(appId) {
            if (!windows[appId]) return; const w = windows[appId];
            if (w.maximized) { w.el.classList.remove('maximized');
                w.el.style.cssText += `width:${w.w}px;height:${w.h}px;left:${w.l}px;top:${w.t}px`;
                w.maximized = false; } else { w.el.classList.add('maximized');
                w.maximized = true; }
        }
        function updateDockActive() {
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            if (focusedWindow) { const d = document.querySelector(`.dock-item[data-app="${focusedWindow}"]`); if (d) d.classList.add('active'); }
        }

        let dragData = null;
        function startDrag(e, appId) { if (!windows[appId] || windows[appId].maximized) return;
            e.preventDefault(); const r = windows[appId].el.getBoundingClientRect();
            dragData = { appId, ox: e.clientX - r.left, oy: e.clientY - r.top };
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag); }

        function onDrag(e) { if (!dragData) return;
            windows[dragData.appId].el.style.left = (e.clientX - dragData.ox) + 'px';
            windows[dragData.appId].el.style.top = (e.clientY - dragData.oy) + 'px'; }

        function stopDrag() { dragData = null;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag); }
        let resizeData = null;
        function startResize(e, appId) { if (!windows[appId] || windows[appId].maximized) return;
            e.preventDefault();
            e.stopPropagation(); const r = windows[appId].el.getBoundingClientRect();
            resizeData = { appId, sx: e.clientX, sy: e.clientY, sw: r.width, sh: r.height };
            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup', stopResize); }

        function onResize(e) { if (!resizeData) return; const w = windows[resizeData.appId].el;
            w.style.width = Math.max(320, resizeData.sw + e.clientX - resizeData.sx) + 'px';
            w.style.height = Math.max(200, resizeData.sh + e.clientY - resizeData.sy) + 'px'; }

        function stopResize() { resizeData = null;
            document.removeEventListener('mousemove', onResize);
            document.removeEventListener('mouseup', stopResize); }

        // ==================== 打开应用 ====================
        function openApp(appId) {
            const titles = { finder: '访达', photos: '照片', music: '音乐', messages: '信息', community: '班级社区', schedule: '日历', files: '文件', ai: 'C2 Intelligence', random: '随机抽选', settings: '系统设置' };
            const sizes = { finder: [750, 500], photos: [750, 500], music: [500, 420], messages: [550, 450], community: [650, 500], schedule: [600, 420], files: [600, 450], ai: [650, 500], random: [750, 550], settings: [700, 500] };
            const [w, h] = sizes[appId] || [600, 400];
            if (windows[appId] && !windows[appId].minimized) { focusWindow(appId); return; }
            if (windows[appId] && windows[appId].minimized) { windows[appId].minimized = false;
                windows[appId].el.style.display = 'flex';
                focusWindow(appId); return; }
            if (appId === 'exam') { enterExamMode(); return; }
            createWindow(appId, titles[appId] || appId, w, h);
        }

        function renderAppContent(appId) {
            const el = document.getElementById('content-' + appId); if (!el) return;
            const db = getDB();
            switch (appId) {
                case 'finder':
                    el.innerHTML = `<div class="card"><h3>😊 访达</h3><p>快速访问您的所有文件和文件夹</p></div><div class="card"><h4>📊 今日概览</h4><p>帖子：${db.posts.length} | 日程：${db.schedules.length} | 文件：${db.files.length} | 照片：${db.photos.length}</p></div><div class="card"><h4>📁 最近文件</h4>${db.files.slice(-5).map(f=>`<p>📄 ${f.name}</p>`).join('')||'<p style="opacity:0.5">暂无文件</p>'}</div>`;
                    break;
                case 'photos':
                    el.innerHTML = `<div class="card"><h3>🌸 照片</h3><p>共 ${db.photos.length} 张照片</p><input type="file" accept="image/*" onchange="addPhoto(this)" multiple style="margin-top:8px"></div><div class="photos-grid">${db.photos.length===0?'<p style="opacity:0.5;grid-column:1/-1;text-align:center;padding:40px">📸 点击上方上传照片</p>':db.photos.map((p,i)=>`<div class="photo-thumb" onclick="viewPhoto('${appId}',${i})">🖼️</div>`).join('')}</div>`;
                    break;
                case 'music':
                    const track = db.musicPlaylist[db.currentTrack] || db.musicPlaylist[0];
                    el.innerHTML = `<div class="music-player"><div class="album-art">🎵</div><h3>${track.title}</h3><p style="opacity:0.6">${track.artist} · ${track.duration}</p><div class="progress-bar" onclick="seekMusic(event)"><div class="progress-fill" id="musicProgress-${appId}"></div></div><div class="music-controls"><button class="music-btn" onclick="prevTrack('${appId}')">⏮</button><button class="music-btn play" id="playBtn-${appId}" onclick="togglePlay('${appId}')">▶️</button><button class="music-btn" onclick="nextTrack('${appId}')">⏭</button></div><div style="margin-top:12px"><h4>播放列表</h4>${db.musicPlaylist.map((t,i)=>`<p style="cursor:pointer;padding:4px 0;${i===db.currentTrack?'color:var(--mac-accent)':''}" onclick="selectTrack('${appId}',${i})">${t.title} - ${t.artist}</p>`).join('')}</div></div>`;
                    break;
                case 'messages':
                    const msgs = db.messages['class'] || [];
                    el.innerHTML = `<div class="card"><h3>💬 班级群聊</h3><div style="max-height:250px;overflow-y:auto">${msgs.map(m=>`<div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.06)"><b style="font-size:12px">${m.sender}</b><p style="font-size:13px">${m.content}</p></div>`).join('')}</div><input id="msgInput-${appId}" placeholder="输入消息"><button class="btn-primary" onclick="sendMsg('${appId}')" style="margin-top:8px">发送</button></div>`;
                    break;
                case 'community':
                    el.innerHTML = `<div class="card"><h3>👥 班级社区</h3><input id="postTitle-${appId}" placeholder="标题"><textarea id="postContent-${appId}" placeholder="内容" style="margin-top:8px"></textarea><button class="btn-primary" onclick="createPost('${appId}')" style="margin-top:8px">发布</button></div>${db.posts.slice(-10).reverse().map(p=>`<div class="card"><h4>${p.title}</h4><p>${p.content}</p><small style="opacity:0.5">${new Date(p.time).toLocaleString()}</small></div>`).join('')}`;
                    break;
                case 'schedule':
                    el.innerHTML = `<div class="card"><h3>📅 日历</h3><input id="schedTitle-${appId}" placeholder="标题"><input type="date" id="schedDate-${appId}" style="margin-top:8px"><button class="btn-primary" onclick="addSchedule('${appId}')" style="margin-top:8px">添加</button></div>${db.schedules.map(s=>`<div class="card"><h4>${s.title}</h4><p>${s.date}</p></div>`).join('')}`;
                    break;
                case 'files':
                    el.innerHTML = `<div class="card"><h3>📁 文件</h3><input type="file" id="fileInput-${appId}" onchange="uploadFile('${appId}')"><div style="margin-top:12px">${db.files.map(f=>`<div class="card"><p>📄 ${f.name} (${(f.size/1024).toFixed(1)}KB)</p></div>`).join('')||'<p style="opacity:0.5">暂无文件</p>'}</div></div>`;
                    break;
                case 'ai':
                    el.innerHTML = `<div class="card"><h3>🤖 C2 Intelligence</h3><div id="aiChat-${appId}" style="max-height:200px;overflow-y:auto"></div><input id="aiInput-${appId}" placeholder="输入问题"><button class="btn-primary" onclick="sendAiMsg('${appId}')" style="margin-top:8px">发送</button></div>`;
                    break;
                case 'random':
                    renderRandomContent(el, appId);
                    break;
                case 'settings':
                    el.innerHTML = `<div class="settings-sidebar"><div class="settings-nav"><div class="settings-nav-item active" onclick="switchSettingsTab(event,'general')">通用</div><div class="settings-nav-item" onclick="switchSettingsTab(event,'appearance')">外观</div><div class="settings-nav-item" onclick="switchSettingsTab(event,'sound')">声音</div><div class="settings-nav-item" onclick="switchSettingsTab(event,'privacy')">隐私</div></div><div class="settings-content" id="settingsContent-${appId}"><h3>通用设置</h3><p style="opacity:0.6">系统版本：macOS 26</p><p style="opacity:0.6">平台：2班智慧班级平台</p><p style="opacity:0.6">存储使用：${(new Blob([localStorage.getItem(DB_KEY)||'']).size/1024).toFixed(1)} KB</p></div></div>`;
                    break;
            }
        }

        function switchSettingsTab(e, tab) {
            e.target.parentElement.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
            e.target.classList.add('active');
            const contentId = 'settingsContent-' + Object.keys(windows).find(k => windows[k]?.title === '系统设置');
            const el = document.getElementById(contentId);
            if (!el) return;
            const contents = {
                general: '<h3>通用设置</h3><p style="opacity:0.6">系统版本：macOS 26</p>',
                appearance: '<h3>外观</h3><p style="opacity:0.6">深色模式：已启用</p><p style="opacity:0.6">强调色：蓝色</p>',
                sound: '<h3>声音</h3><p style="opacity:0.6">提示音：默认</p><p style="opacity:0.6">音量：60%</p>',
                privacy: '<h3>隐私</h3><p style="opacity:0.6">数据存储：本地浏览器</p><p style="opacity:0.6">无数据上传</p>'
            };
            el.innerHTML = contents[tab] || '';
        }

        // ==================== 随机抽选 ====================
        const drawStates = {};
        function getDrawState(appId) { if (!drawStates[appId]) { const a = Array.from({ length: 26 }, (_, i) => `A${i + 1}`),
                    b = Array.from({ length: 25 }, (_, i) => `B${i + 1}`);
                drawStates[appId] = { students: [...a, ...b], selectedStudents: new Set([...a, ...b]),
                    excludedStudents: new Set(), history: [], mode: 'auto', drawing: false, timeout: null, frame: null,
                    startTime: 0, BASE: 50 }; } return drawStates[appId]; }

        function renderRandomContent(el, appId) {
            const s = getDrawState(appId);
            el.innerHTML = `<div style="display:flex;gap:20px;flex-wrap:wrap"><div style="flex:1;min-width:250px"><div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn-primary" onclick="selectAllDraw('${appId}')" style="font-size:12px">全选</button><button class="btn-primary" onclick="deselectAllDraw('${appId}')" style="font-size:12px">取消</button><button class="btn-primary" onclick="resetAllDraw('${appId}')" style="font-size:12px">重置</button></div><div class="students-grid-draw" id="studentsGrid-${appId}"></div></div><div style="width:280px;text-align:center"><div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px"><button class="btn-primary" id="modeAuto-${appId}" onclick="setDrawMode('${appId}','auto')" style="font-size:12px">Auto</button><button class="btn-primary" id="modeManual-${appId}" onclick="setDrawMode('${appId}','manual')" style="font-size:12px;opacity:0.5">Manual</button></div><div class="draw-circle-large" id="drawCircle-${appId}">?</div><button class="btn-primary" id="actionBtn-${appId}" onclick="toggleDraw('${appId}')" style="width:180px;padding:12px;font-size:16px">Start</button><div style="margin-top:12px;background:rgba(0,0,0,0.2);border-radius:12px;padding:10px"><p style="font-size:12px">📋 历史 (<span id="historyCount-${appId}">0</span>)</p><div id="historyList-${appId}" style="display:flex;flex-wrap:wrap;gap:4px;max-height:100px;overflow-y:auto"></div></div></div></div>`;
            renderStudentsGrid(appId);
        }

        function renderStudentsGrid(appId) { const s = getDrawState(appId), g = document.getElementById('studentsGrid-' + appId); if (!g) return;
            g.innerHTML = '';
            s.students.forEach(id => { const d = document.createElement('div');
                d.className = 'student-cell';
                d.textContent = id; if (s.selectedStudents.has(id)) d.classList.add('selected'); if (s.excludedStudents.has(id)) d.classList.add('excluded');
                d.addEventListener('click', () => { if (s.excludedStudents.has(id)) return; if (s.selectedStudents.has(id)) s.selectedStudents.delete(id); else s.selectedStudents.add(id);
                    renderStudentsGrid(appId); }); let lt = null;
                d.addEventListener('mousedown', () => { if (s.students.filter(x => !s.excludedStudents.has(x)).length < 3 || s.excludedStudents.has(id)) return;
                    lt = setTimeout(() => { s.excludedStudents.add(id);
                        s.selectedStudents.delete(id);
                        renderStudentsGrid(appId);
                        lt = null; }, 3000); });
                d.addEventListener('mouseup', () => { if (lt) clearTimeout(lt); });
                d.addEventListener('mouseleave', () => { if (lt) clearTimeout(lt); });
                g.appendChild(d); });
        }

        function selectAllDraw(appId) { const s = getDrawState(appId);
            s.students.forEach(id => { if (!s.excludedStudents.has(id)) s.selectedStudents.add(id); });
            renderStudentsGrid(appId); }

        function deselectAllDraw(appId) { getDrawState(appId).selectedStudents.clear();
            renderStudentsGrid(appId); }

        function resetAllDraw(appId) { const s = getDrawState(appId);
            s.selectedStudents = new Set(s.students);
            s.excludedStudents.clear();
            s.history = [];
            document.getElementById('drawCircle-' + appId).textContent = '?';
            document.getElementById('drawCircle-' + appId).className = 'draw-circle-large';
            renderStudentsGrid(appId);
            updateHistoryDraw(appId); }

        function setDrawMode(appId, mode) { const s = getDrawState(appId);
            s.mode = mode;
            document.getElementById('modeAuto-' + appId).style.opacity = mode === 'auto' ? '1' : '0.5';
            document.getElementById('modeManual-' + appId).style.opacity = mode === 'manual' ? '1' : '0.5'; }

        function toggleDraw(appId) { const s = getDrawState(appId); if (s.drawing) stopDraw(appId); else startDraw(appId); }

        function startDraw(appId) { const s = getDrawState(appId); const a = Array.from(s.selectedStudents).filter(id => !s.excludedStudents.has(id)); if (a.length === 0) return;
            s.drawing = true;
            document.getElementById('actionBtn-' + appId).textContent = 'Stop';
            document.getElementById('drawCircle-' + appId).classList.add('rolling');
            s.startTime = performance.now(); if (s.mode === 'auto') animateAuto(appId, a); else animateManual(appId, a); }

        function animateAuto(appId, a) { const s = getDrawState(appId); const d = 5000; const c = document.getElementById('drawCircle-' + appId);

            function step(t) { if (!s.drawing) return; const e = Math.min((t - s.startTime) / d, 1); const iv = s.BASE + (500 - s.BASE) * Math.pow(e, 2);
                c.textContent = a[Math.floor(Math.random() * a.length)]; if (e < 1) { s.timeout = setTimeout(() => { s.frame = requestAnimationFrame(step); }, iv); } else stopDraw(appId); }
            s.frame = requestAnimationFrame(step); }

        function animateManual(appId, a) { const s = getDrawState(appId); const c = document.getElementById('drawCircle-' + appId);

            function step() { if (!s.drawing) return;
                c.textContent = a[Math.floor(Math.random() * a.length)];
                s.timeout = setTimeout(() => { s.frame = requestAnimationFrame(step); }, s.BASE); }
            s.frame = requestAnimationFrame(step); }

        function stopDraw(appId) { const s = getDrawState(appId); if (!s.drawing) return;
            s.drawing = false; if (s.timeout) clearTimeout(s.timeout); if (s.frame) cancelAnimationFrame(s.frame);
            document.getElementById('actionBtn-' + appId).textContent = 'Start';
            document.getElementById('drawCircle-' + appId).classList.remove('rolling');
            document.getElementById('drawCircle-' + appId).classList.add('winner'); const w = document.getElementById('drawCircle-' + appId).textContent; if (w && w !== '?' && !s.history.includes(w)) { s.history.unshift(w); if (s.history.length > 51) s.history.pop();
                updateHistoryDraw(appId); } }

        function updateHistoryDraw(appId) { const s = getDrawState(appId); const l = document.getElementById('historyList-' + appId); const c = document.getElementById('historyCount-' + appId); if (!l || !c) return;
            c.textContent = s.history.length;
            l.innerHTML = s.history.map((x, i) => `<span style="padding:2px 8px;background:rgba(52,152,219,0.3);border-radius:10px;font-size:11px;margin:2px">${s.history.length-i}. ${x}</span>`).join(''); }

        // ==================== 应用功能 ====================
        function createPost(appId) { const t = document.getElementById('postTitle-' + appId)?.value.trim(); const c = document.getElementById('postContent-' + appId)?.value.trim(); if (!t || !c) return; const db = getDB();
            db.posts.push({ id: genId(), title: t, content: c, time: new Date().toISOString() });
            saveDB(db);
            renderAppContent('community'); }
        function sendMsg(appId) { const i = document.getElementById('msgInput-' + appId); if (!i || !i.value.trim()) return; const db = getDB(); if (!db.messages['class']) db.messages['class'] = [];
            db.messages['class'].push({ id: genId(), sender: '我', content: i.value.trim(), time: new Date().toISOString() });
            saveDB(db);
            renderAppContent('messages'); }
        function addSchedule(appId) { const t = document.getElementById('schedTitle-' + appId)?.value.trim(); const d = document.getElementById('schedDate-' + appId)?.value; if (!t || !d) return; const db = getDB();
            db.schedules.push({ id: genId(), title: t, date: d });
            saveDB(db);
            renderAppContent('schedule'); }
        function uploadFile(appId) { const f = document.getElementById('fileInput-' + appId)?.files[0]; if (!f) return; const db = getDB();
            db.files.push({ id: genId(), name: f.name, size: f.size });
            saveDB(db);
            renderAppContent('files'); }
        function sendAiMsg(appId) { const i = document.getElementById('aiInput-' + appId); if (!i || !i.value.trim()) return; const c = document.getElementById('aiChat-' + appId);
            c.innerHTML += `<p><b>你:</b> ${i.value}</p><p><b>C2:</b> 这是一个模拟回复。</p>`;
            i.value = ''; }
        function addPhoto(input) { const files = input.files; if (!files.length) return; const db = getDB(); for (let f of files) { db.photos.push({ id: genId(), name: f.name, size: f.size, time: new Date().toISOString() }); }
            saveDB(db);
            renderAppContent('photos'); }
        function viewPhoto(appId, index) { const db = getDB();
            alert('📸 ' + db.photos[index]?.name || '照片'); }

        // ==================== Apple Music ====================
        function togglePlay(appId) { const db = getDB();
            db.isPlaying = !db.isPlaying;
            saveDB(db); const btn = document.getElementById('playBtn-' + appId); if (btn) btn.textContent = db.isPlaying ? '⏸' : '▶️'; }
        function nextTrack(appId) { const db = getDB();
            db.currentTrack = (db.currentTrack + 1) % db.musicPlaylist.length;
            saveDB(db);
            renderAppContent('music'); }
        function prevTrack(appId) { const db = getDB();
            db.currentTrack = (db.currentTrack - 1 + db.musicPlaylist.length) % db.musicPlaylist.length;
            saveDB(db);
            renderAppContent('music'); }
        function selectTrack(appId, index) { const db = getDB();
            db.currentTrack = index;
            saveDB(db);
            renderAppContent('music'); }
        function seekMusic(event) { const bar = event.target; const rect = bar.getBoundingClientRect(); const pct = (event.clientX - rect.left) / rect.width * 100;
            document.getElementById('musicProgress-' + Object.keys(windows).find(k => windows[k]?.title === '音乐')).style.width = pct + '%'; }

        // ==================== 控制中心 ====================
        function toggleControlCenter() { document.getElementById('controlCenter').classList.toggle('show'); }
        function toggleCC(type) { const db = getDB();
            db.settings[type] = !db.settings[type];
            saveDB(db); const tile = document.getElementById('cc-' + type); if (tile) tile.classList.toggle('active',
                db.settings[type]); }
        function toggleDarkMode() { document.body.style.filter = document.body.style.filter === 'invert(1) hue-rotate(180deg)' ? '' : 'invert(1) hue-rotate(180deg)'; }

        // ==================== 考试模式 ====================
        function enterExamMode() { document.getElementById('examModeOverlay').classList.add('show');
            updateExamDisplay(); }
        function exitExamMode() { document.getElementById('examModeOverlay').classList.remove('show'); }
        function showExamSettings() { const db = getDB(); const s = prompt('科目：', db.examSettings.subject || '数学'); const st = prompt('开始(HH:MM)：', db.examSettings.startTime || '08:00'); const et = prompt('结束(HH:MM)：', db.examSettings.endTime || '10:00'); if (s && st && et) { db.examSettings = { subject: s,
                    startTime: st, endTime: et };
                saveDB(db);
                updateExamDisplay(); } }

        function updateExamDisplay() { const db = getDB(); const { subject, startTime, endTime } = db.examSettings;
            document.getElementById('examSubject').textContent = subject;
            document.getElementById('examTimeRange').textContent = `${startTime} - ${endTime}`;
            updateExamClock(); }

        function updateExamClock() { const n = new Date();
            document.getElementById('examClock').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
            document.getElementById('examDate').textContent = n.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric',
                month: 'long', day: 'numeric' }); }

        // ==================== 时钟 ====================
        function updateClocks() { const n = new Date();
            document.getElementById('menubarTime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`; if (document.getElementById('examModeOverlay').classList.contains('show')) updateExamClock(); }
        setInterval(updateClocks, 1000);
        updateClocks();

        // 初始化
        openApp('finder');
    </script>
</body>
</html>
