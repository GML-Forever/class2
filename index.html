<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2班 · 智慧班级平台</title>
    <meta name="description" content="2班智慧班级平台">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ps-blue: #003791; --ps-light-blue: #0070CC; --ps-cyan: #00B4D8;
            --ps-dark: #0A0A0A; --ps-gray: #1A1A1A;
            --ps-card: rgba(255,255,255,0.03); --ps-card-hover: rgba(255,255,255,0.06);
            --ps-border: rgba(255,255,255,0.08); --ps-text: #FFFFFF;
            --ps-text-secondary: rgba(255,255,255,0.55);
            --ps-gradient: linear-gradient(135deg, #003791 0%, #0070CC 50%, #00B4D8 100%);
            --ps-glow: 0 0 40px rgba(0,112,204,0.25);
            --apple-radius: 20px; --apple-radius-sm: 14px;
            --apple-transition: cubic-bezier(0.22, 0.61, 0.36, 1);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--ps-dark);
            color: var(--ps-text); min-height: 100vh; overflow-x: hidden;
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .ps-background { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .ps-bg-gradient {
            position:absolute; width:100%; height:100%;
            background: radial-gradient(ellipse at 15% 40%, rgba(0,55,145,0.5) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 25%, rgba(0,112,204,0.35) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 75%, rgba(0,180,216,0.25) 0%, transparent 55%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        @keyframes gradientShift { 0%,100%{opacity:1} 25%{opacity:.75} 50%{opacity:.9} 75%{opacity:.8} }
        .ps-particles { position:absolute; width:100%; height:100%; }
        .particle { position:absolute; background:var(--ps-cyan); border-radius:50%; animation:floatUp linear infinite; opacity:0; }
        @keyframes floatUp { 0%{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:.7} 90%{opacity:.15} 100%{transform:translateY(-100px) scale(1);opacity:0} }

        /* 全屏登录 */
        .fullscreen-login {
            position:fixed; top:0; left:0; width:100%; height:100%; z-index:500;
            background: var(--ps-dark); display:flex; align-items:center; justify-content:center;
        }
        .fullscreen-login.hidden { display:none; }
        .login-container {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(40px);
            border:1px solid var(--ps-border); border-radius:24px; padding:3rem;
            width:440px; max-width:92vw; text-align:center;
            animation: slideUp 0.5s var(--apple-transition);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
        .login-container .login-logo {
            width:80px; height:80px; border-radius:22px; background:var(--ps-gradient);
            display:flex; align-items:center; justify-content:center;
            font-size:2rem; font-weight:900; font-family:'Space Grotesk',sans-serif;
            margin:0 auto 1.5rem; box-shadow:var(--ps-glow);
        }
        .login-container h2 { font-size:1.8rem; font-weight:800; margin-bottom:.5rem; }
        .login-container p { color:var(--ps-text-secondary); margin-bottom:1.5rem; }
        .login-container select, .login-container input {
            width:100%; margin:.5rem 0; padding:.7rem 1rem; border-radius:12px;
            border:1.5px solid var(--ps-border); background:rgba(255,255,255,.04);
            color:var(--ps-text); font-family:inherit; font-size:.9rem;
        }
        .login-container .btn-login {
            width:100%; padding:.8rem; font-size:1rem; margin-top:.5rem;
            background:var(--ps-gradient); color:#fff; border:none; border-radius:12px;
            font-weight:700; cursor:pointer; transition: all .3s;
        }
        .login-container .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,55,145,.5); }
        .login-container .toggle-link { color:var(--ps-light-blue); cursor:pointer; font-weight:600; margin-top:1rem; display:block; }

        /* PS5 导航 */
        .ps5-top-nav {
            position:sticky; top:0; z-index:100; background:rgba(10,10,10,.75);
            backdrop-filter:blur(35px); border-bottom:1px solid var(--ps-border);
            padding:.6rem 1.5rem; display:flex; align-items:center; justify-content:center; gap:1.5rem;
        }
        .ps5-nav-icon { display:flex; flex-direction:column; align-items:center; gap:.3rem; cursor:pointer; transition:all .3s; padding:.4rem; border-radius:14px; min-width:64px; }
        .ps5-nav-icon .icon-square {
            width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center;
            font-size:1.3rem; background:rgba(255,255,255,.05); color:var(--ps-text-secondary);
            transition:all .35s; border:1.5px solid transparent;
        }
        .ps5-nav-icon .icon-label { font-size:.65rem; font-weight:600; color:var(--ps-text-secondary); opacity:0; transform:translateY(-5px); transition:all .35s; }
        .ps5-nav-icon:hover .icon-square { background:rgba(255,255,255,.1); color:var(--ps-text); }
        .ps5-nav-icon:hover .icon-label { opacity:.7; transform:translateY(0); }
        .ps5-nav-icon.active .icon-square {
            background:var(--ps-gradient); color:#fff; transform:scale(1.15);
            box-shadow:var(--ps-glow); width:56px; height:56px; border-radius:16px; font-size:1.5rem;
        }
        .ps5-nav-icon.active .icon-label { opacity:1; transform:translateY(0); color:var(--ps-text); font-weight:700; }
        .nav-actions { display:flex; align-items:center; gap:.8rem; margin-left:auto; }
        .search-box {
            background:rgba(255,255,255,.06); border:1px solid var(--ps-border); border-radius:25px;
            padding:.4rem .8rem; display:flex; align-items:center; gap:.4rem;
        }
        .search-box input { border:none; background:transparent; outline:none; color:var(--ps-text); width:100px; }
        .btn { border:none; padding:.5rem 1.2rem; border-radius:25px; font-weight:600; cursor:pointer; font-size:.8rem; }
        .btn-primary { background:var(--ps-gradient); color:#fff; }
        .btn-outline { background:transparent; color:var(--ps-text); border:1.5px solid var(--ps-border); }
        .btn-sm { padding:.3rem .8rem; font-size:.72rem; }
        .user-badge { display:flex; align-items:center; gap:.4rem; background:rgba(255,255,255,.06); padding:.3rem 1rem; border-radius:25px; font-size:.8rem; border:1px solid var(--ps-border); }
        .role-tag { font-size:.65rem; background:var(--ps-gradient); color:#fff; padding:.1rem .5rem; border-radius:10px; }
        .btn-logout { background:transparent; border:none; color:#ff4757; cursor:pointer; font-weight:600; font-size:.75rem; }
        .main-container { display:flex; flex:1; }
        .sidebar { width:280px; min-width:280px; background:rgba(10,10,10,.55); backdrop-filter:blur(30px); border-right:1px solid var(--ps-border); display:none; }
        .sidebar.visible { display:flex; flex-direction:column; }
        .content-area { flex:1; padding:1.5rem; overflow-y:auto; }
        .card {
            background:var(--ps-card); backdrop-filter:blur(30px); border:1px solid var(--ps-border);
            border-radius:var(--apple-radius); padding:1.5rem; margin-bottom:1.2rem;
            animation: cardAppear .5s ease both;
        }
        @keyframes cardAppear { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .grid { display:grid; gap:1rem; }
        .grid-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
        .toast {
            position:fixed; top:25px; right:25px; background:var(--ps-gray); color:var(--ps-text);
            padding:.8rem 1.5rem; border-radius:25px; font-weight:600; z-index:300;
            border:1px solid var(--ps-border); animation:toastIn .35s, toastOut .35s 2.5s forwards;
        }
        @keyframes toastIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-10px)} }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.65); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:200; }
        .modal-overlay.hidden { display:none; }
        .modal-content { background:var(--ps-gray); border:1px solid var(--ps-border); border-radius:20px; padding:2rem; width:500px; max-width:92vw; }
        select, input, textarea { background:rgba(255,255,255,.04); border:1.5px solid var(--ps-border); color:var(--ps-text); border-radius:10px; padding:.6rem; width:100%; font-family:inherit; }
        .badge { padding:.2rem .6rem; border-radius:12px; font-size:.7rem; font-weight:600; }
        .badge-success { background:rgba(16,185,129,.2); color:var(--success); }
        .badge-warning { background:rgba(245,158,11,.2); color:var(--warning); }
        .badge-danger { background:rgba(239,68,68,.2); color:var(--danger); }
        @media(max-width:768px){ .ps5-top-nav{gap:.6rem} .ps5-nav-icon .icon-square{width:38px;height:38px} }
    </style>
</head>
<body>
    <div class="ps-background"><div class="ps-bg-gradient"></div><div class="ps-particles" id="particles"></div></div>
    <div id="toastContainer"></div>

    <!-- 全屏登录界面 -->
    <div class="fullscreen-login" id="fullscreenLogin">
        <div class="login-container">
            <div class="login-logo">2班</div>
            <h2 id="loginTitle">🔐 登录</h2>
            <p>2班 · 智慧班级平台</p>
            <select id="loginIdentity">
                <option value="teacher">👨‍🏫 老师</option>
                <option value="parent">👨‍👩‍👧 家长</option>
                <option value="student">🎒 学生</option>
                <option value="admin">👑 管理员</option>
                <option value="host">💻 主机端</option>
            </select>
            <input type="text" id="loginUsername" placeholder="用户名">
            <input type="password" id="loginPassword" placeholder="密码">
            <button class="btn-login" id="loginBtn" onclick="handleLogin()">✅ 登录</button>
            <span class="toggle-link" onclick="toggleLoginMode()">还没有账号？去注册</span>
        </div>
    </div>

    <!-- 主应用（初始隐藏） -->
    <div class="app-container" id="mainApp" style="display:none;flex-direction:column;min-height:100vh">
        <header class="ps5-top-nav">
            <div class="ps5-nav-icon active" data-page="home" onclick="navigateTo('home')"><div class="icon-square"><i class="fas fa-home"></i></div><span class="icon-label">主页</span></div>
            <div class="ps5-nav-icon" data-page="ai" onclick="navigateTo('ai')"><div class="icon-square"><i class="fas fa-robot"></i></div><span class="icon-label">AI</span></div>
            <div class="ps5-nav-icon" data-page="community" onclick="navigateTo('community')"><div class="icon-square"><i class="fas fa-users"></i></div><span class="icon-label">社区</span></div>
            <div class="ps5-nav-icon" data-page="messages" onclick="navigateTo('messages')"><div class="icon-square"><i class="fas fa-comments"></i></div><span class="icon-label">消息</span></div>
            <div class="ps5-nav-icon" data-page="schedule" onclick="navigateTo('schedule')"><div class="icon-square"><i class="fas fa-calendar"></i></div><span class="icon-label">日程</span></div>
            <div class="ps5-nav-icon" data-page="attendance" onclick="navigateTo('attendance')"><div class="icon-square"><i class="fas fa-clipboard-check"></i></div><span class="icon-label">考勤</span></div>
            <div class="ps5-nav-icon" data-page="grades" onclick="navigateTo('grades')"><div class="icon-square"><i class="fas fa-chart-bar"></i></div><span class="icon-label">成绩</span></div>
            <div class="ps5-nav-icon" data-page="files" onclick="navigateTo('files')"><div class="icon-square"><i class="fas fa-folder"></i></div><span class="icon-label">文件</span></div>
            <div class="ps5-nav-icon" data-page="random" id="randomNavIcon"><div class="icon-square"><i class="fas fa-shuffle"></i></div><span class="icon-label">抽选</span></div>
            <div class="nav-actions">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="搜索..." id="globalSearch" onkeypress="if(event.key==='Enter')performSearch()"></div>
                <div class="user-badge" id="userBadge"></div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar" id="chatSidebar"><div class="sidebar-header">群聊</div><ul class="sidebar-list" id="groupList"></ul></aside>
            <main class="content-area" id="mainContent"></main>
        </div>
    </div>

    <!-- 通用模态框 -->
    <div class="modal-overlay hidden" id="generalModal"><div class="modal-content" id="generalModalContent"></div></div>

    <script>
        (function(){const pc=document.getElementById('particles');for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';const s=Math.random()*3+2;p.style.width=s+'px';p.style.height=s+'px';p.style.backgroundColor=['#00B4D8','#0070CC','#003791'][i%3];p.style.animationDuration=Math.random()*10+8+'s';pc.appendChild(p);}})();

        const DB_KEY='class2_v10', PRESET_ADMIN={id:'admin001',username:'admin',password:'class2admin2024',role:'admin',name:'管理员'}, PRESET_HOST={id:'host001',username:'host',password:'class2host2024',role:'host',name:'班级电脑'};
        function getDB(){let db=localStorage.getItem(DB_KEY);if(!db){db={users:[{...PRESET_ADMIN},{...PRESET_HOST},{id:'u3',username:'teacher1',password:'123456',role:'teacher',name:'张老师'},{id:'u4',username:'student1',password:'123456',role:'student',name:'李华',studentId:'A12'},{id:'u5',username:'parent1',password:'123456',role:'parent',name:'李华家长',linkedStudent:'A12'}],messages:{teacher:[],class:[],parent:[],student:[]},posts:[],schedules:[],grades:[],files:[],attendance:[],leaveRequests:[],nextId:200};localStorage.setItem(DB_KEY,JSON.stringify(db));}else{db=JSON.parse(db);let save=false;if(!db.users.find(u=>u.id==='admin001')){db.users.push({...PRESET_ADMIN});save=true;}if(!db.users.find(u=>u.id==='host001')){db.users.push({...PRESET_HOST});save=true;}if(!db.attendance){db.attendance=[];save=true;}if(!db.leaveRequests){db.leaveRequests=[];save=true;}if(save)localStorage.setItem(DB_KEY,JSON.stringify(db));}return db;}
        function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db));}
        function genId(){const db=getDB();db.nextId++;saveDB(db);return'id'+db.nextId;}

        const SK_CU='class2_currentUser_v10';
        let currentUser=JSON.parse(localStorage.getItem(SK_CU)||'null');
        let currentPage='home', loginMode='login', currentGroup='class';

        function toast(m,t=''){const c=document.getElementById('toastContainer'),d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),3000);}
        function saveCU(){currentUser?localStorage.setItem(SK_CU,JSON.stringify(currentUser)):localStorage.removeItem(SK_CU);}
        function roleName(r){return{admin:'管理员',teacher:'老师',parent:'家长',student:'学生',host:'主机端'}[r]||r;}
        function getCurrentUserName(){if(!currentUser)return'';const db=getDB();const u=db.users.find(u=>u.id===currentUser.id);return u?u.name:currentUser.username;}

        // 登录逻辑修复
        function handleLogin(){
            const btn=document.getElementById('loginBtn');
            btn.disabled=true; btn.textContent='处理中...';
            const identity=document.getElementById('loginIdentity').value;
            const username=document.getElementById('loginUsername').value.trim();
            const password=document.getElementById('loginPassword').value.trim();
            if(!username||!password){toast('⚠️ 请填写用户名和密码','error');btn.disabled=false;btn.textContent='✅ 登录';return;}
            if(username.length<3||password.length<4){toast('⚠️ 用户名≥3字符，密码≥4字符','error');btn.disabled=false;btn.textContent='✅ 登录';return;}
            const db=getDB();
            if(loginMode==='register'){
                if(identity==='admin'||identity==='host'){toast('⚠️ 不可注册管理员/主机端','error');btn.disabled=false;btn.textContent='✅ 注册';return;}
                if(db.users.find(u=>u.username===username)){toast('⚠️ 用户名已存在','error');btn.disabled=false;btn.textContent='✅ 注册';return;}
                db.users.push({id:genId(),username,password,role:identity,name:username,studentId:identity==='student'?`A${Math.floor(Math.random()*26)+1}`:undefined});
                saveDB(db);toast('✅ 注册成功，请登录','success');
                loginMode='login'; toggleLoginMode(); btn.disabled=false; btn.textContent='✅ 登录'; return;
            }
            const u=db.users.find(u=>u.username===username&&u.password===password&&u.role===identity);
            if(!u){toast('❌ 账号或密码错误','error');btn.disabled=false;btn.textContent='✅ 登录';return;}
            currentUser={id:u.id,username:u.username,role:u.role,studentId:u.studentId};saveCU();
            document.getElementById('fullscreenLogin').classList.add('hidden');
            document.getElementById('mainApp').style.display='flex';
            document.getElementById('loginUsername').value='';document.getElementById('loginPassword').value='';
            renderAll();toast(`👋 欢迎，${u.name||u.username}`,'success');
            btn.disabled=false;btn.textContent='✅ 登录';
        }

        function toggleLoginMode(){
            loginMode=loginMode==='login'?'register':'login';
            document.getElementById('loginTitle').textContent=loginMode==='login'?'🔐 登录':'📝 注册';
            const btn=document.getElementById('loginBtn');
            btn.textContent=loginMode==='login'?'✅ 登录':'✅ 注册';
            const sel=document.getElementById('loginIdentity');
            if(loginMode==='register') sel.innerHTML='<option value="teacher">👨‍🏫 老师</option><option value="parent">👨‍👩‍👧 家长</option><option value="student">🎒 学生</option>';
            else sel.innerHTML='<option value="teacher">👨‍🏫 老师</option><option value="parent">👨‍👩‍👧 家长</option><option value="student">🎒 学生</option><option value="admin">👑 管理员</option><option value="host">💻 主机端</option>';
        }

        function logout(){if(confirm('确定退出？')){currentUser=null;saveCU();document.getElementById('mainApp').style.display='none';document.getElementById('fullscreenLogin').classList.remove('hidden');loginMode='login';toggleLoginMode();toast('👋 已退出');}}

        function renderAll(){if(!currentUser)return;renderUserBadge();renderSidebar();renderMain();updateNav();}
        function renderUserBadge(){const c=document.getElementById('userBadge');c.innerHTML=`${currentUser.role==='admin'?'👑':''}${currentUser.role==='host'?'💻':''} ${getCurrentUserName()} <span class="role-tag">${roleName(currentUser.role)}</span>`;}
        function renderSidebar(){const s=document.getElementById('chatSidebar');if(currentPage!=='messages'){s.classList.remove('visible');return;}s.classList.add('visible');const groups=[{id:'teacher',name:'教师群',icon:'fa-chalkboard-teacher',roles:['teacher','admin']},{id:'class',name:'班级群',icon:'fa-school',roles:['teacher','student','parent','host','admin']},{id:'parent',name:'家长群',icon:'fa-user-friends',roles:['parent']},{id:'student',name:'学生群',icon:'fa-graduation-cap',roles:['student']}];const ug=groups.filter(g=>g.roles.includes(currentUser.role));document.getElementById('groupList').innerHTML=ug.map(g=>`<li class="sidebar-item${currentGroup===g.id?' active':''}" onclick="switchGroup('${g.id}')"><i class="fas ${g.icon}"></i>${g.name}</li>`).join('');}
        function switchGroup(id){currentGroup=id;renderAll();}
        function renderMain(){
            const m=document.getElementById('mainContent');
            if(currentPage==='home') m.innerHTML=`<div class="card"><h2>👋 欢迎, ${getCurrentUserName()}</h2><p>选择上方功能开始使用</p></div>`;
            else if(currentPage==='messages'){const db=getDB();const msgs=db.messages[currentGroup]||[];m.innerHTML=`<div class="card"><h3>${currentGroup}群</h3><div style="max-height:60vh;overflow-y:auto">${msgs.map(msg=>`<p><b>${msg.senderName}</b>: ${msg.content}</p>`).join('')}</div><input id="msgInput" placeholder="输入消息"><button onclick="sendGroupMsg()">发送</button></div>`;}
            else m.innerHTML=`<div class="card"><h3>${currentPage} 页面</h3><p>功能开发中</p></div>`;
        }
        function sendGroupMsg(){const input=document.getElementById('msgInput');if(!input||!input.value.trim())return;const db=getDB();if(!db.messages[currentGroup])db.messages[currentGroup]=[];db.messages[currentGroup].push({id:genId(),senderName:getCurrentUserName(),content:input.value.trim(),time:new Date().toISOString()});saveDB(db);renderAll();}
        function updateNav(){document.querySelectorAll('.ps5-nav-icon').forEach(i=>i.classList.toggle('active',i.dataset.page===currentPage));document.getElementById('randomNavIcon').style.display=(currentUser&&(currentUser.role==='host'||currentUser.role==='admin'))?'flex':'none';}
        function navigateTo(p){currentPage=p;renderAll();}
        function performSearch(){toast('搜索功能开发中');}

        // 初始化
        if(currentUser){document.getElementById('fullscreenLogin').classList.add('hidden');document.getElementById('mainApp').style.display='flex';renderAll();}
        else{ loginMode='login'; toggleLoginMode(); }
    </script>
</body>
</html>
